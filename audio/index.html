<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Audio Reactive</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #050508; overflow: hidden; }
    canvas { display: block; }
    #ui { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #ui.hidden { opacity: 0; pointer-events: none; transition: opacity 1s; }
    #drop-text { font: 22px monospace; color: rgba(255,255,255,0.3); letter-spacing: 3px; cursor: pointer; }
    #drop-sub { margin-top: 8px; font: 12px monospace; color: rgba(255,255,255,0.15); }
    #file-input { display: none; }
    #back { position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.35); font: 14px monospace; text-decoration: none; z-index: 40; }
    #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20; opacity: 0; }
    #controls.visible { opacity: 1; }
    #controls button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); font: 13px monospace; padding: 6px 16px; border-radius: 4px; cursor: pointer; }
    #mode-label { position: fixed; top: 20px; right: 20px; font: 12px monospace; color: rgba(255,255,255,0.2); z-index: 20; }
  </style>
</head>
<body>
  <a id="back" href="../">&larr; back</a>
  <div id="ui">
    <div id="drop-text">drop an audio file or click here</div>
    <div id="drop-sub">supports mp3, wav, ogg, flac</div>
  </div>
  <input type="file" id="file-input" accept="audio/*">
  <div id="controls"><button id="pause-btn">pause</button></div>
  <div id="mode-label">wireframe</div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    /* ── renderer (identical to working test.html) ── */
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x050508);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 60, 250);
    camera.lookAt(0, 0, 0);

    /* ── MODE 0: SHATTERING WIREFRAME ── */
    const mode0 = new THREE.Group();
    const faces = [];
    const srcGeo = new THREE.IcosahedronGeometry(60, 3);
    // convert to non-indexed so we can just read position triples as faces
    const nonIndexed = srcGeo.toNonIndexed();
    const srcArr = nonIndexed.attributes.position.array;
    for (let f = 0; f < srcArr.length; f += 9) {
      const v = srcArr.slice(f, f + 9);
      const cx = (v[0]+v[3]+v[6])/3, cy = (v[1]+v[4]+v[7])/3, cz = (v[2]+v[5]+v[8])/3;
      const d = Math.sqrt(cx*cx+cy*cy+cz*cz) || 1;
      // local space verts
      const lv = new Float32Array(9);
      for (let j = 0; j < 9; j += 3) { lv[j]=v[j]-cx; lv[j+1]=v[j+1]-cy; lv[j+2]=v[j+2]-cz; }
      const fg = new THREE.BufferGeometry();
      fg.setAttribute('position', new THREE.BufferAttribute(lv, 3));
      const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, wireframe: true, side: THREE.DoubleSide });
      const fm = new THREE.Mesh(fg, mat);
      fm.position.set(cx, cy, cz);
      mode0.add(fm);
      faces.push({ m: fm, mat, cx, cy, cz, d, nx: cx/d, ny: cy/d, nz: cz/d, rx: Math.random()*2-1, ry: Math.random()*2-1 });
    }
    scene.add(mode0);

    /* ── MODE 1: RINGS ── */
    const mode1 = new THREE.Group();
    const rings = [];
    for (let i = 0; i < 8; i++) {
      const c = new THREE.Color(0xff0d64).lerp(new THREE.Color(0x00e5ff), i / 8);
      const m = new THREE.Mesh(
        new THREE.TorusGeometry(30 + i * 15, 0.4, 6, 80),
        new THREE.MeshBasicMaterial({ color: c, wireframe: true })
      );
      m.rotation.x = Math.PI / 2 + (i - 4) * 0.15;
      mode1.add(m);
      rings.push(m);
    }
    mode1.visible = false;
    scene.add(mode1);

    /* ── MODE 2: GRID TERRAIN ── */
    const mode2 = new THREE.Group();
    const gridGeo = new THREE.PlaneGeometry(400, 400, 60, 60);
    gridGeo.rotateX(-Math.PI / 2);
    const gridBase = Float32Array.from(gridGeo.attributes.position.array);
    mode2.add(new THREE.Mesh(gridGeo, new THREE.MeshBasicMaterial({ color: 0x1a33ff, wireframe: true })));
    mode2.visible = false;
    scene.add(mode2);

    /* ── MODE 3: RIBBONS ── */
    const mode3 = new THREE.Group();
    const ribbonGeos = [];
    for (let r = 0; r < 6; r++) {
      const arr = new Float32Array(150 * 3);
      // initialize with a visible line so it doesn't start degenerate
      for (let p = 0; p < 150; p++) {
        arr[p * 3] = (p / 150 - 0.5) * 300;
        arr[p * 3 + 1] = Math.sin(p * 0.1 + r) * 20;
        arr[p * 3 + 2] = Math.cos(p * 0.08 + r) * 15;
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
      const c = new THREE.Color(0x8800ff).lerp(new THREE.Color(0x00e5ff), r / 6);
      mode3.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: c })));
      ribbonGeos.push({ geo: g, off: r * 1.5 });
    }
    mode3.visible = false;
    scene.add(mode3);

    /* ── mode management ── */
    const MODES = [mode0, mode1, mode2, mode3];
    const NAMES = ['wireframe', 'rings', 'terrain', 'ribbons'];
    let curMode = 0;
    document.getElementById('mode-label').textContent = NAMES[0];

    renderer.domElement.addEventListener('click', () => {
      if (!audioReady) return;
      MODES[curMode].visible = false;
      curMode = (curMode + 1) % MODES.length;
      MODES[curMode].visible = true;
      document.getElementById('mode-label').textContent = NAMES[curMode];
    });

    /* ── audio ── */
    let audioCtx, analyser, freqData, audioReady = false, sourceConnected = false;
    const audioEl = new Audio();

    function initAudio(file) {
      if (!audioCtx) {
        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.82;
        freqData = new Uint8Array(analyser.frequencyBinCount);
      }
      audioEl.src = URL.createObjectURL(file);
      audioEl.loop = true;
      if (!sourceConnected) {
        audioCtx.createMediaElementSource(audioEl).connect(analyser);
        analyser.connect(audioCtx.destination);
        sourceConnected = true;
      }
      audioEl.play();
      audioReady = true;
      document.getElementById('ui').className = 'hidden';
      document.getElementById('controls').className = 'visible';
    }

    function getEnergy(low, high) {
      if (!audioReady) return 0;
      analyser.getByteFrequencyData(freqData);
      const bins = freqData.length, ny = audioCtx.sampleRate / 2;
      const lo = Math.floor(low / ny * bins), hi = Math.min(Math.floor(high / ny * bins), bins - 1);
      let sum = 0, count = 0;
      for (let i = lo; i <= hi; i++) { sum += freqData[i]; count++; }
      return count > 0 ? (sum / count) / 255 : 0;
    }

    /* ── file handling ── */
    document.getElementById('ui').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('file-input').addEventListener('change', (e) => { if (e.target.files[0]) initAudio(e.target.files[0]); });
    document.body.addEventListener('dragover', (e) => e.preventDefault());
    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('audio/')) initAudio(f);
    });

    let paused = false;
    document.getElementById('pause-btn').addEventListener('click', () => {
      paused = !paused;
      if (paused) { audioEl.pause(); document.getElementById('pause-btn').textContent = 'play'; }
      else { audioEl.play(); document.getElementById('pause-btn').textContent = 'pause'; }
    });

    /* ── animate ── */
    let time = 0, sBass = 0, sMid = 0, sHigh = 0;
    let prevBass = 0, prevMid = 0, prevHigh = 0;
    let bassAttack = 0, midAttack = 0, highAttack = 0; // spike detectors
    let bassPunch = 0; // decaying punch for rhythmic hits

    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;

      const bass = getEnergy(20, 150);
      const mid = getEnergy(150, 2000);
      const high = getEnergy(2000, 16000);
      sBass += (bass - sBass) * 0.15;
      sMid += (mid - sMid) * 0.12;
      sHigh += (high - sHigh) * 0.1;

      // attack detection: how much did energy JUMP this frame?
      bassAttack = Math.max(0, bass - prevBass);
      midAttack = Math.max(0, mid - prevMid);
      highAttack = Math.max(0, high - prevHigh);
      prevBass = bass; prevMid = mid; prevHigh = high;

      // bass punch: spikes on kick drums, decays fast
      bassPunch = Math.max(bassPunch * 0.85, bassAttack * 4);

      if (curMode === 0) {
        // shatter: faces fly outward on bass punches, reassemble when quiet
        const explode = bassPunch * 60;
        // color shifts with mids: cyan → pink → purple
        const hue = (sMid * 0.8 + time * 0.05) % 1;
        const midColor = new THREE.Color().setHSL(hue * 0.3 + 0.5, 0.9, 0.5 + sBass * 0.2);

        for (let i = 0; i < faces.length; i++) {
          const f = faces[i];
          // pure outward displacement — no rotation, no size change
          // music breaks the sphere, silence reassembles it
          f.m.position.set(
            f.cx + f.nx * explode,
            f.cy + f.ny * explode,
            f.cz + f.nz * explode
          );
          f.mat.color.copy(midColor);
        }

        mode0.rotation.y = time * (0.15 + sBass * 0.2);
        mode0.rotation.x = Math.sin(time * 0.12) * 0.2;
      }

      if (curMode === 1) {
        for (let i = 0; i < rings.length; i++) {
          const band = i / 8;
          const e = band < 0.35 ? sBass : band < 0.65 ? sMid : sHigh;
          rings[i].scale.setScalar(1 + e * 0.4);
          rings[i].rotation.z = time * (0.2 + i*0.08) * (i%2 ? 1 : -1);
          rings[i].rotation.x = Math.PI/2 + (i-4)*0.15 + Math.sin(time*0.5+i)*e*0.3;
        }
      }

      if (curMode === 2) {
        const p = gridGeo.attributes.position.array;
        for (let i = 0; i < p.length; i += 3) {
          const x = gridBase[i], z = gridBase[i+2];
          p[i+1] = Math.sin(x*0.02+time*1.5)*Math.cos(z*0.02+time)*sBass*40
                  + Math.sin(x*0.08+time*4)*Math.sin(z*0.06-time*3)*sMid*15
                  + Math.sin(x*0.3+z*0.3+time*10)*sHigh*5;
        }
        gridGeo.attributes.position.needsUpdate = true;
      }

      if (curMode === 3) {
        for (let r = 0; r < ribbonGeos.length; r++) {
          const rb = ribbonGeos[r];
          const pos = rb.geo.attributes.position.array;
          for (let p = 0; p < 150; p++) {
            const s = p / 150;
            pos[p*3] = (s - 0.5) * 300;
            pos[p*3+1] = Math.sin(s*4+time*2+rb.off)*(20+sBass*40) + Math.sin(s*12+time*5+rb.off*2)*sMid*15;
            pos[p*3+2] = Math.cos(s*3+time*1.5+rb.off)*(15+sMid*20) + Math.sin(s*8+time*6)*sHigh*10;
          }
          rb.geo.attributes.position.needsUpdate = true;
        }
      }

      // camera
      const camY = curMode === 2 ? 120 : 60;
      const camZ = curMode === 2 ? 180 : 250;
      camera.position.x += (Math.sin(time*0.1)*30 - camera.position.x) * 0.02;
      camera.position.y += (camY + Math.sin(time*0.07)*15 - camera.position.y) * 0.02;
      camera.position.z += (camZ + Math.cos(time*0.08)*20 - camera.position.z) * 0.02;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
