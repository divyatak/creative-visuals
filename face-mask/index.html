<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Particle Face Mask</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; }
    canvas { display: block; }
    video#cam { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    .ui {
      position: fixed;
      color: rgba(255,255,255,0.45);
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    .title { top: 24px; left: 300px; }
    .title .v { color: rgba(255,255,255,0.25); margin-left: 12px; }
    .hint {
      bottom: 24px;
      left: 300px;
      color: rgba(255,255,255,0.35);
      font-size: 10px;
    }
    .back {
      top: 24px; right: 28px;
      pointer-events: auto;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      letter-spacing: 2px;
      font-size: 11px;
      transition: color 0.3s ease;
    }
    .back:hover { color: rgba(255,255,255,0.85); }

    .lil-gui.root {
      --background-color: rgba(12,12,12,0.88);
      --text-color: rgba(255,255,255,0.85);
      --title-background-color: rgba(0,0,0,0.55);
      --title-text-color: rgba(255,255,255,0.7);
      --widget-color: rgba(255,255,255,0.10);
      --hover-color: rgba(255,255,255,0.18);
      --focus-color: rgba(255,255,255,0.28);
      --number-color: rgba(255,200,150,0.95);
      --string-color: rgba(150,220,255,0.95);
      --font-family: 'SF Mono','Consolas',monospace;
      --font-size: 11px;
      --input-font-size: 11px;
      --padding: 8px;
      --spacing: 4px;
      --slider-knob-width: 2px;
      left: 20px; right: auto; top: 20px;
      width: 260px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
    }
    .lil-gui .title { letter-spacing: 1.5px; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20.0/dist/lil-gui.esm.js"
    }
  }
  </script>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <div class="ui title">PARTICLE FACE MASK <span class="v" id="modeLabel">v3 · sheet</span></div>
  <div class="ui hint" id="hint">drag your cursor — the sheet sinks under you in z; particles never leave their xy</div>
  <a class="ui back" href="../">← back</a>

  <script type="module">
    import * as THREE from 'three';
    import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
    import GUI from 'lil-gui';

    // ---------- Config ----------
    const PARTICLES_DIM = 256;
    const PARTICLES = PARTICLES_DIM * PARTICLES_DIM;
    const FACE_LM_COUNT = 478;                    // MediaPipe FaceLandmarker outputs 478 (468 + 10 iris)

    // MediaPipe Z is roughly in [-0.07, +0.05] for typical framing — back-of-face baseline.
    // Features whose mp_z is BELOW this threshold press into the sheet; everything else is flat.
    const FACE_Z_BASELINE = 0.03;

    const hintEl = document.getElementById('hint');
    const modeLabelEl = document.getElementById('modeLabel');

    // ---------- Renderer ----------
    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x050505, 1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ---------- Main scene ----------
    let aspect = window.innerWidth / window.innerHeight;
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0.1, 10);
    camera.position.z = 1;

    // ---------- GPGPU setup ----------
    const gpu = new GPUComputationRenderer(PARTICLES_DIM, PARTICLES_DIM, renderer);
    if (renderer.capabilities.isWebGL2 === false) gpu.setDataType(THREE.HalfFloatType);

    const posTex  = gpu.createTexture();
    const velTex  = gpu.createTexture();
    const infoTex = gpu.createTexture();   // RG = wall xy, A = seed (used for tiny ambient noise)
    initTextures(posTex, velTex, infoTex, aspect);

    // ---------- Sim shaders ----------
    // Velocity: Z-only. Particles sample the depth field at their home XY and spring toward that Z.
    const velocityShader = /* glsl */`
      uniform sampler2D uInfo;
      uniform sampler2D uDepthTex;

      uniform float uAspect;
      uniform float uStiffness;       // spring rate toward target Z ("particle speed")
      uniform float uDamping;
      uniform float uAmbient;         // tiny Z noise so the field is alive even at rest
      uniform float uTime;
      uniform float uDt;

      // ---- Simplex 3D (Ashima) ----
      vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
      vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
      vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314*r;}
      float snoise(vec3 v){
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
                   i.z + vec4(0.0, i1.z, i2.z, 1.0)) +
                   i.y + vec4(0.0, i1.y, i2.y, 1.0)) +
                   i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }

      void main(){
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 pos = texture2D(positionTexture, uv);
        vec4 vel = texture2D(velocityTexture, uv);
        vec4 info = texture2D(uInfo, uv);

        vec2  wallPos = info.rg;
        float seed   = info.a;

        // Sample the depth field at this particle's home XY.
        // Depth RT covers the same world view as main camera, so:
        //   world (-aspect..aspect, -1..1)  →  UV (0..1, 0..1)
        vec2 dUv = vec2(wallPos.x / uAspect, wallPos.y) * 0.5 + 0.5;
        vec4 d = texture2D(uDepthTex, dUv);
        // Encoded as (z*gauss, gauss, 0, 1) summed over splats.
        // Decode weighted-average z; influence fades to 0 where coverage is low (outside the face area).
        float weight = d.g;
        float decodedZ = d.r / max(weight, 1e-4);
        float influence = smoothstep(0.04, 0.35, weight);
        float targetZ = decodedZ * influence;

        // Tiny ambient Z drift so the field always breathes a little — keeps things alive
        // even with no input. Phase by seed + wallPos so neighbours don't move in lockstep.
        float amb = snoise(vec3(wallPos * 2.4, uTime * 0.4 + seed * 6.28));
        targetZ += amb * uAmbient;

        // Z-only spring. XY velocity always zero by construction.
        float zForce = (targetZ - pos.z) * uStiffness;
        float newVz = vel.z * uDamping + zForce * uDt;

        // Soft cap so very high stiffness doesn't blow up
        float maxV = 8.0;
        if (abs(newVz) > maxV) newVz = sign(newVz) * maxV;

        gl_FragColor = vec4(0.0, 0.0, newVz, 0.0);
      }
    `;

    // Position: lock XY to home (info.rg), integrate Z.
    const positionShader = /* glsl */`
      uniform sampler2D uInfo;
      uniform float uDt;
      void main(){
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 pos = texture2D(positionTexture, uv);
        vec4 vel = texture2D(velocityTexture, uv);
        vec4 info = texture2D(uInfo, uv);
        pos.xy = info.rg;            // never drift — locked to wall
        pos.z += vel.z * uDt;
        gl_FragColor = pos;
      }
    `;

    const positionVar = gpu.addVariable('positionTexture', positionShader, posTex);
    const velocityVar = gpu.addVariable('velocityTexture', velocityShader, velTex);
    gpu.setVariableDependencies(positionVar, [positionVar, velocityVar]);
    gpu.setVariableDependencies(velocityVar, [positionVar, velocityVar]);

    positionVar.material.uniforms.uDt   = { value: 0 };
    positionVar.material.uniforms.uInfo = { value: infoTex };

    const vU = velocityVar.material.uniforms;
    vU.uInfo      = { value: infoTex };
    vU.uDepthTex  = { value: null };           // filled after depthRT exists
    vU.uAspect    = { value: aspect };
    vU.uStiffness = { value: 30.0 };
    vU.uDamping   = { value: 0.965 };
    vU.uAmbient   = { value: 0.0 };
    vU.uTime      = { value: 0 };
    vU.uDt        = { value: 0 };

    const initErr = gpu.init();
    if (initErr) console.error('GPUComputationRenderer init error:', initErr);

    // ---------- Particle render mesh ----------
    const particleGeo = new THREE.BufferGeometry();
    {
      const positions = new Float32Array(PARTICLES * 3);
      const refs      = new Float32Array(PARTICLES * 2);
      const seeds     = new Float32Array(PARTICLES);
      for (let i = 0; i < PARTICLES; i++) {
        const x = i % PARTICLES_DIM;
        const y = (i / PARTICLES_DIM) | 0;
        refs[i*2]   = (x + 0.5) / PARTICLES_DIM;
        refs[i*2+1] = (y + 0.5) / PARTICLES_DIM;
        seeds[i]    = Math.random();
      }
      particleGeo.setAttribute('position',  new THREE.BufferAttribute(positions, 3));
      particleGeo.setAttribute('reference', new THREE.BufferAttribute(refs, 2));
      particleGeo.setAttribute('aSeed',     new THREE.BufferAttribute(seeds, 1));
    }

    const particleMat = new THREE.ShaderMaterial({
      uniforms: {
        uPositionTex: { value: null },
        uVelocityTex: { value: null },
        uSize:        { value: 2.7 },
        uPixelRatio:  { value: renderer.getPixelRatio() },
        uBrightness:  { value: 0.35 }
      },
      vertexShader: /* glsl */`
        attribute vec2  reference;
        attribute float aSeed;
        uniform sampler2D uPositionTex;
        uniform sampler2D uVelocityTex;
        uniform float uSize;
        uniform float uPixelRatio;
        varying float vSpeed;
        varying float vSeed;
        varying float vDepth;
        void main(){
          vec4 pos = texture2D(uPositionTex, reference);
          vec4 vel = texture2D(uVelocityTex, reference);
          vSpeed = abs(vel.z);
          vSeed  = aSeed;
          vDepth = pos.z;
          // Ortho view: XY only on screen; pos.z drives the look via depth shading + size.
          vec4 mvPosition = modelViewMatrix * vec4(pos.x, pos.y, 0.0, 1.0);
          gl_Position = projectionMatrix * mvPosition;
          float sz = uSize * (0.75 + 0.5 * aSeed);
          float depthScale = clamp(1.0 + pos.z * 0.6, 0.4, 1.5);
          gl_PointSize = sz * uPixelRatio * depthScale;
        }
      `,
      fragmentShader: /* glsl */`
        varying float vSpeed;
        varying float vSeed;
        varying float vDepth;
        uniform float uBrightness;
        void main(){
          vec2 c = gl_PointCoord * 2.0 - 1.0;
          c.y = -c.y;
          float r2 = dot(c, c);
          if (r2 > 1.0) discard;
          float nz = sqrt(1.0 - r2);
          vec3 N = vec3(c, nz);

          vec3 keyL  = normalize(vec3( 0.45,  0.55, 0.7));
          vec3 fillL = normalize(vec3(-0.35, -0.4 , 0.5));
          float key  = max(dot(N, keyL),  0.0);
          float fill = max(dot(N, fillL), 0.0);
          float spec = pow(max(dot(N, keyL), 0.0), 28.0);

          vec3 cold = vec3(0.62, 0.55, 0.45);
          vec3 warm = vec3(1.10, 0.85, 0.55);
          vec3 hot  = vec3(1.55, 1.25, 0.95);
          float heat = clamp(vSpeed * 1.4, 0.0, 1.0);
          vec3 base = mix(cold, warm, heat);
          base = mix(base, hot, smoothstep(0.5, 1.0, heat));
          base *= 0.92 + 0.16 * vSeed;

          float depthShade = clamp(1.0 + vDepth * 0.65, 0.30, 1.20);
          vec3 col = base * (0.22 + 0.9 * key + 0.25 * fill) * depthShade;
          col += vec3(0.95, 0.85, 0.75) * spec * 0.55 * depthShade;

          float a = smoothstep(1.0, 0.88, r2);
          gl_FragColor = vec4(col * uBrightness, a);
        }
      `,
      blending: THREE.AdditiveBlending,
      transparent: true,
      depthWrite: false,
      depthTest: false
    });

    const points = new THREE.Points(particleGeo, particleMat);
    points.frustumCulled = false;
    scene.add(points);

    // ---------- DEPTH FIELD (offscreen) ----------
    // A height/depth map painted each frame from input "splats" (cursor + face landmarks).
    // Encoding per pixel: (z * gauss, gauss, 0, 1), additively blended.
    // Decoded later in sim as weighted-average Z, with influence fading to 0 outside coverage.
    function makeDepthRT(w, h) {
      return new THREE.WebGLRenderTarget(w, h, {
        type: THREE.HalfFloatType,
        format: THREE.RGBAFormat,
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        depthBuffer: false,
        stencilBuffer: false
      });
    }
    let depthRT = makeDepthRT(512, Math.max(64, Math.round(512 / aspect)));
    vU.uDepthTex.value = depthRT.texture;

    const depthScene  = new THREE.Scene();
    const depthCamera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, -1, 1);

    // Shared splat material — vertex carries (position, aZ, aRadius, aActive)
    const splatMat = new THREE.ShaderMaterial({
      uniforms: {
        uPixelsPerWorld: { value: depthRT.height / 2 }
      },
      vertexShader: /* glsl */`
        attribute float aZ;
        attribute float aRadius;
        attribute float aActive;
        varying float vZ;
        varying float vActive;
        uniform float uPixelsPerWorld;
        void main(){
          vZ = aZ;
          vActive = aActive;
          vec4 mv = modelViewMatrix * vec4(position.xy, 0.0, 1.0);
          gl_Position = projectionMatrix * mv;
          gl_PointSize = max(2.0, aRadius * uPixelsPerWorld);
        }
      `,
      fragmentShader: /* glsl */`
        varying float vZ;
        varying float vActive;
        void main(){
          vec2 c = gl_PointCoord - 0.5;
          float d2 = dot(c, c);
          float g = exp(-d2 * 7.0);    // Gaussian falloff (compact, smooth)
          g *= vActive;
          gl_FragColor = vec4(vZ * g, g, 0.0, 1.0);
        }
      `,
      blending: THREE.AdditiveBlending,
      transparent: true,
      depthWrite: false,
      depthTest: false
    });

    // -- cursor splat: a single point updated by mouse movement --
    const cursorSplatGeo = new THREE.BufferGeometry();
    const cursorPos      = new Float32Array(3);
    const cursorZArr     = new Float32Array(1);
    const cursorRadArr   = new Float32Array(1);
    const cursorActArr   = new Float32Array(1);
    cursorPos.set([999, 999, 0]);
    cursorZArr[0]   = -0.6;
    cursorRadArr[0] = 0.42;
    cursorActArr[0] = 0;
    cursorSplatGeo.setAttribute('position', new THREE.BufferAttribute(cursorPos, 3));
    cursorSplatGeo.setAttribute('aZ',       new THREE.BufferAttribute(cursorZArr, 1));
    cursorSplatGeo.setAttribute('aRadius',  new THREE.BufferAttribute(cursorRadArr, 1));
    cursorSplatGeo.setAttribute('aActive',  new THREE.BufferAttribute(cursorActArr, 1));
    const cursorSplat = new THREE.Points(cursorSplatGeo, splatMat);
    cursorSplat.frustumCulled = false;
    depthScene.add(cursorSplat);

    // -- face splat: 478 points, updated each frame from MediaPipe --
    const faceSplatGeo = new THREE.BufferGeometry();
    const facePos      = new Float32Array(FACE_LM_COUNT * 3);
    const faceZArr     = new Float32Array(FACE_LM_COUNT);
    const faceRadArr   = new Float32Array(FACE_LM_COUNT);
    const faceActArr   = new Float32Array(FACE_LM_COUNT);
    for (let i = 0; i < FACE_LM_COUNT; i++) {
      faceRadArr[i] = 0.085;
      faceActArr[i] = 0;
    }
    faceSplatGeo.setAttribute('position', new THREE.BufferAttribute(facePos, 3));
    faceSplatGeo.setAttribute('aZ',       new THREE.BufferAttribute(faceZArr, 1));
    faceSplatGeo.setAttribute('aRadius',  new THREE.BufferAttribute(faceRadArr, 1));
    faceSplatGeo.setAttribute('aActive',  new THREE.BufferAttribute(faceActArr, 1));
    const faceSplat = new THREE.Points(faceSplatGeo, splatMat);
    faceSplat.frustumCulled = false;
    depthScene.add(faceSplat);

    // ---------- Post-processing ----------
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.35, 0.6, 0.0
    );
    composer.addPass(bloom);

    const finishPass = new ShaderPass({
      uniforms: {
        tDiffuse:    { value: null },
        uTime:       { value: 0 },
        uAberration: { value: 0.0012 },
        uVignette:   { value: 1.10 },
        uGrain:      { value: 0.040 }
      },
      vertexShader: /* glsl */`
        varying vec2 vUv;
        void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
      `,
      fragmentShader: /* glsl */`
        uniform sampler2D tDiffuse;
        uniform float uTime;
        uniform float uAberration;
        uniform float uVignette;
        uniform float uGrain;
        varying vec2 vUv;
        float hash(vec2 p){ return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
        void main(){
          vec2 uv = vUv;
          vec2 dir = uv - 0.5;
          float fall = dot(dir, dir);
          float aber = uAberration * (1.0 + fall * 3.5);
          float r = texture2D(tDiffuse, uv - dir * aber).r;
          float g = texture2D(tDiffuse, uv).g;
          float b = texture2D(tDiffuse, uv + dir * aber).b;
          vec3 col = vec3(r, g, b);
          float vig = 1.0 - fall * uVignette;
          vig = clamp(vig, 0.0, 1.0);
          col *= mix(0.4, 1.0, pow(vig, 1.4));
          float n = hash(gl_FragCoord.xy + uTime * 73.0) - 0.5;
          col += n * uGrain;
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
    composer.addPass(finishPass);
    composer.addPass(new OutputPass());

    // ---------- Input (cursor) ----------
    const cursor     = new THREE.Vector2(999, 999);
    let   cursorEver = false;

    function setCursorFromEvent(clientX, clientY) {
      cursor.x = (clientX / window.innerWidth  - 0.5) * 2 * aspect;
      cursor.y = -(clientY / window.innerHeight - 0.5) * 2;
      cursorEver = true;
    }
    window.addEventListener('mousemove', e => setCursorFromEvent(e.clientX, e.clientY));
    window.addEventListener('mouseleave', () => { cursorEver = false; });
    window.addEventListener('touchmove', e => {
      if (e.touches[0]) setCursorFromEvent(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    window.addEventListener('touchend', () => { cursorEver = false; });

    // ---------- Resize ----------
    window.addEventListener('resize', () => {
      aspect = window.innerWidth / window.innerHeight;
      camera.left = -aspect; camera.right = aspect; camera.top = 1; camera.bottom = -1;
      camera.updateProjectionMatrix();
      depthCamera.left = -aspect; depthCamera.right = aspect; depthCamera.top = 1; depthCamera.bottom = -1;
      depthCamera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloom.setSize(window.innerWidth, window.innerHeight);
      const newH = Math.max(64, Math.round(512 / aspect));
      depthRT.setSize(512, newH);
      splatMat.uniforms.uPixelsPerWorld.value = newH / 2;
      vU.uAspect.value = aspect;
    });

    // ---------- MediaPipe FaceLandmarker ----------
    let faceLandmarker = null;
    const faceVideo = document.getElementById('cam');
    let faceLoading = false;
    let faceReady = false;
    let lastFaceVideoTime = -1;

    async function ensureFaceMode() {
      if (faceReady || faceLoading) return;
      faceLoading = true;
      hintEl.textContent = 'loading face tracking…';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' }, audio: false
        });
        faceVideo.srcObject = stream;
        await new Promise((res, rej) => {
          faceVideo.onloadedmetadata = res;
          faceVideo.onerror = rej;
        });
        await faceVideo.play();

        const { FaceLandmarker, FilesetResolver } = await import(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs'
        );
        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
        );
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath:
              'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
            delegate: 'GPU'
          },
          runningMode: 'VIDEO',
          numFaces: 1
        });
        faceReady = true;
        faceLoading = false;
        hintEl.textContent = 'face mode — your features sculpt the field in z';
      } catch (err) {
        console.error('face mode init failed', err);
        hintEl.textContent = 'face tracking unavailable — using sheet mode';
        faceLoading = false;
        params.mode = 'sheet';
        modeLabelEl.textContent = 'v3 · sheet';
        gui.controllersRecursive().forEach(c => c.updateDisplay());
      }
    }

    function deactivateAllFaceSplats() {
      let any = false;
      for (let i = 0; i < FACE_LM_COUNT; i++) {
        if (faceActArr[i] !== 0) { faceActArr[i] = 0; any = true; }
      }
      if (any) faceSplatGeo.attributes.aActive.needsUpdate = true;
    }

    function updateFaceSplats(now) {
      if (!faceReady) return false;
      if (faceVideo.currentTime === lastFaceVideoTime) return null;
      lastFaceVideoTime = faceVideo.currentTime;
      const result = faceLandmarker.detectForVideo(faceVideo, now);
      if (!result.faceLandmarks || result.faceLandmarks.length === 0) {
        deactivateAllFaceSplats();
        return false;
      }
      const lm = result.faceLandmarks[0];
      const scale  = params.faceScale;
      const relief = params.reliefIntensity;
      const fRad   = params.faceSplatRadius;
      const N = Math.min(FACE_LM_COUNT, lm.length);
      for (let i = 0; i < N; i++) {
        const p = lm[i];
        // Selfie-mirror in x, ortho y-flip
        const wx = (0.5 - p.x) * 2 * aspect * scale;
        const wy = -(p.y - 0.5) * 2 * scale;
        // Press depth: anything more-forward than baseline pushes the sheet behind
        const press = Math.max(0, FACE_Z_BASELINE - p.z);
        const z = -relief * press;
        const o = i * 3;
        facePos[o]   = wx;
        facePos[o+1] = wy;
        facePos[o+2] = 0;
        faceZArr[i]  = z;
        faceRadArr[i] = fRad;
        faceActArr[i] = 1;
      }
      for (let i = N; i < FACE_LM_COUNT; i++) faceActArr[i] = 0;
      faceSplatGeo.attributes.position.needsUpdate = true;
      faceSplatGeo.attributes.aZ.needsUpdate       = true;
      faceSplatGeo.attributes.aRadius.needsUpdate  = true;
      faceSplatGeo.attributes.aActive.needsUpdate  = true;
      return true;
    }

    function updateCursorSplat(dt) {
      cursorPos[0] = cursor.x;
      cursorPos[1] = cursor.y;
      cursorZArr[0]   = -params.cursorDepth;
      cursorRadArr[0] = params.cursorRadius;
      // Smoothly ramp in/out so a quick mouse-leave doesn't snap the dent away
      const target = (params.mode === 'sheet' && cursorEver) ? 1 : 0;
      const cur = cursorActArr[0];
      cursorActArr[0] = cur + (target - cur) * Math.min(1, dt * (target ? 8 : 3));
      cursorSplatGeo.attributes.position.needsUpdate = true;
      cursorSplatGeo.attributes.aZ.needsUpdate       = true;
      cursorSplatGeo.attributes.aRadius.needsUpdate  = true;
      cursorSplatGeo.attributes.aActive.needsUpdate  = true;
    }

    // ---------- Control panel ----------
    const params = {
      mode: 'sheet',
      // particles
      particleSize: 2.7,
      brightness: 0.35,
      speed: 30.0,           // = stiffness (how fast particles chase the target z)
      damping: 0.965,
      ambient: 0.0,
      // cursor (sheet mode)
      cursorRadius: 0.42,
      cursorDepth: 0.6,
      // face (face mode)
      faceScale: 1.7,
      faceSplatRadius: 0.085,
      reliefIntensity: 4.0,
      // post
      bloomStrength: 0.35,
      bloomRadius: 0.6,
      aberration: 0.0012,
      vignette: 1.10,
      grain: 0.040,
      exposure: 1.0
    };

    const gui = new GUI({ title: 'CONTROLS' });

    gui.add(params, 'mode', ['sheet', 'face']).name('mode').onChange(v => {
      if (v === 'face') {
        modeLabelEl.textContent = 'v3 · face';
        ensureFaceMode();
      } else {
        modeLabelEl.textContent = 'v3 · sheet';
        hintEl.textContent = 'drag your cursor — the sheet sinks under you in z; particles never leave their xy';
        deactivateAllFaceSplats();
      }
    });

    const fSim = gui.addFolder('particles');
    fSim.add(params, 'particleSize', 1.0, 12.0, 0.1).name('size').onChange(v => particleMat.uniforms.uSize.value = v);
    fSim.add(params, 'brightness', 0.1, 3.0, 0.05).onChange(v => particleMat.uniforms.uBrightness.value = v);
    fSim.add(params, 'speed', 1.0, 30.0, 0.5).name('speed').onChange(v => vU.uStiffness.value = v);
    fSim.add(params, 'damping', 0.6, 0.99, 0.005).onChange(v => vU.uDamping.value = v);
    fSim.add(params, 'ambient', 0.0, 0.08, 0.002).name('ambient drift').onChange(v => vU.uAmbient.value = v);

    const fSheet = gui.addFolder('sheet (cursor)');
    fSheet.add(params, 'cursorRadius', 0.05, 1.0, 0.01).name('radius');
    fSheet.add(params, 'cursorDepth', 0.0, 1.6, 0.02).name('depth');

    const fFace = gui.addFolder('face features');
    fFace.add(params, 'faceScale', 0.6, 3.5, 0.05).name('face scale');
    fFace.add(params, 'faceSplatRadius', 0.02, 0.3, 0.005).name('splat radius');
    fFace.add(params, 'reliefIntensity', 0.0, 12.0, 0.1).name('relief intensity');

    const fPost = gui.addFolder('post');
    fPost.add(params, 'bloomStrength', 0.0, 2.5, 0.05).name('bloom').onChange(v => bloom.strength = v);
    fPost.add(params, 'bloomRadius', 0.0, 1.5, 0.05).name('bloom radius').onChange(v => bloom.radius = v);
    fPost.add(params, 'aberration', 0.0, 0.01, 0.0002).name('chromatic ab.').onChange(v => finishPass.uniforms.uAberration.value = v);
    fPost.add(params, 'vignette', 0.0, 2.5, 0.05).onChange(v => finishPass.uniforms.uVignette.value = v);
    fPost.add(params, 'grain', 0.0, 0.2, 0.005).onChange(v => finishPass.uniforms.uGrain.value = v);
    fPost.add(params, 'exposure', 0.3, 2.5, 0.05).onChange(v => renderer.toneMappingExposure = v);

    // ---------- Main loop ----------
    let lastT = performance.now();
    function tick(now) {
      requestAnimationFrame(tick);
      const dt = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;
      const tSec = now * 0.001;

      // 1. Update splat geometries
      updateCursorSplat(dt);
      if (params.mode === 'face') updateFaceSplats(now);
      else deactivateAllFaceSplats();

      // 2. Render the depth field
      renderer.setRenderTarget(depthRT);
      renderer.setClearColor(0x000000, 0);
      renderer.clear(true, false, false);
      renderer.render(depthScene, depthCamera);
      renderer.setRenderTarget(null);
      renderer.setClearColor(0x050505, 1);

      // 3. Compute particle sim (samples depthRT.texture)
      vU.uDt.value   = dt;
      vU.uTime.value = tSec;
      positionVar.material.uniforms.uDt.value = dt;
      gpu.compute();

      // 4. Render the main scene
      particleMat.uniforms.uPositionTex.value = gpu.getCurrentRenderTarget(positionVar).texture;
      particleMat.uniforms.uVelocityTex.value = gpu.getCurrentRenderTarget(velocityVar).texture;
      finishPass.uniforms.uTime.value = tSec;
      composer.render();
    }
    requestAnimationFrame(tick);

    // ---------- Texture init ----------
    function initTextures(posT, velT, infoT, aspect){
      const posA  = posT.image.data;
      const velA  = velT.image.data;
      const infoA = infoT.image.data;

      const cols = Math.round(Math.sqrt(PARTICLES * aspect));
      const rows = Math.ceil(PARTICLES / cols);

      let i = 0;
      for (let r = 0; r < rows && i < PARTICLES; r++) {
        for (let c = 0; c < cols && i < PARTICLES; c++) {
          const u = (c + Math.random() * 0.85 + 0.075) / cols;
          const v = (r + Math.random() * 0.85 + 0.075) / rows;
          const wx = (u - 0.5) * 2 * aspect;
          const wy = (v - 0.5) * 2;

          const idx = i * 4;
          posA[idx + 0] = wx;
          posA[idx + 1] = wy;
          posA[idx + 2] = 0;
          posA[idx + 3] = Math.random();

          velA[idx + 0] = 0;
          velA[idx + 1] = 0;
          velA[idx + 2] = 0;
          velA[idx + 3] = 0;

          // info: rg = wall pos (locked-to home), b = unused, a = seed (ambient noise phase)
          infoA[idx + 0] = wx;
          infoA[idx + 1] = wy;
          infoA[idx + 2] = 0;
          infoA[idx + 3] = Math.random();

          i++;
        }
      }
    }
  </script>
</body>
</html>
