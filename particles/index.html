<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bioluminescent Flow</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    #back {
      position: fixed; top: 20px; left: 20px;
      color: rgba(255,255,255,0.35); font: 14px monospace;
      text-decoration: none; z-index: 10; cursor: pointer;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>
  <a id="back" href="../">&larr; back</a>
  <div id="hint" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:20px monospace;color:rgba(255,255,255,0.35);letter-spacing:3px;pointer-events:none;z-index:10;transition:opacity 1.5s;">allow camera to see magic</div>
  <video id="video" playsinline style="display:none;"></video>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
    import { HandLandmarker, FilesetResolver } from
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

    // ══════════════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════════════
    // Particle state lives in two float textures (TEX_SIZE²) and is stepped
    // entirely on the GPU (GPGPU ping-pong). The CPU only updates a handful of
    // uniforms + the interactor positions each frame — no per-particle loop.
    const TEX_SIZE = 158;                       // 158² = 24964 particles (~25k)
    const PARTICLE_COUNT = TEX_SIZE * TEX_SIZE;
    const MOUSE_RAD = 80;                        // mouse-fallback interaction radius (px)
    const W = window.innerWidth, H = window.innerHeight;

    // ── Device tier (cheap heuristic; Tier 3 refines this with an FPS probe) ──
    const IS_MOBILE = window.matchMedia('(pointer: coarse)').matches || Math.min(W, H) < 600;
    // Trail/feedback buffers are fillrate-heavy; shrink them on phones.
    let RT_SCALE = IS_MOBILE ? 1.0 : Math.min(window.devicePixelRatio, 2);
    const PIXEL_RATIO = IS_MOBILE ? Math.min(window.devicePixelRatio, 1.5)
                                  : Math.min(window.devicePixelRatio, 2);

    const FLOW_SCALE = 0.0015;   // flow field spatial scale

    // ── Baked simulation parameters (final tuned values) ──
    const DEFAULTS = {
      // ── particle appearance / lifecycle ──
      baseGlow:   0.20,   // resting particle brightness
      excGlow:    0.0,    // extra brightness when disturbed
      alpha:      1.32,   // overall particle opacity / glow
      hueShift:   0.0,    // rotate every particle's hue (0..1 = full colour wheel)
      sat:        1.0,    // colour saturation (0 = grayscale, 1 = full)
      pointSize:  2.9,    // base particle size (px)
      sizeGlow:   1.4,    // how much brighter particles also grow
      lifeMin:    1.5,    // shortest lifespan (s) — lower = faster regen
      lifeRange:  30.0,   // spread of lifespans on top of the minimum (s)
      // ── motion: one shared laminar current + small per-particle wander ──
      currentStr:    0.025, // laminar current strength (the dominant, shared drift)
      currentAngle:  1.94,  // current base direction (radians, 0..2π)
      currentWobble: 0.12,  // how far the current angle swings over time (aliveness)
      wobbleSpeed:   2.0,   // how fast that angle swing happens
      laneFreq:    0.005, // lane density — how many laminae span the stream
      laneAmp:     0.36,  // lane contrast — how differently adjacent laminae move (0 = one rigid sheet)
      meander:     300.0, // how far the laminae wander side-to-side (px) — waves, not straight bands
      meanderFreq: 0.008, // meander scale — long wavelength = lazy S-curves, short = wrinkly
      flowStr:    0.06,   // personal wander strength (curl noise — keep well below currentStr)
      flowSpeed:  1.30,   // how fast each particle's wander evolves
      damping:    0.908,  // velocity retention (higher = floatier, more movement)
      jitter:     0.08,   // shimmer
      trail:      0.958,  // trail persistence (higher = longer trails)
      handSmooth: 0.10,   // hand jitter smoothing (lower = smoother, laggier)
      detectMs:   60,     // ms between MediaPipe detections (lower = fresher targets, heavier)
      repelRad:   0.12,   // repulsion radius (× hand span)
      repelStr:   0.31    // repulsion push strength
    };
    const params = Object.assign({}, DEFAULTS);

    // ── Hand appearance/shape — finalized (panel removed; these are the baked values) ──
    const HAND_DEFAULTS = {
      fingerThick: 1.09,  // finger/thumb thickness multiplier
      baseMul:     0.99,  // knuckle-end thickness multiplier
      tipMul:      0.65,  // fingertip-end thickness multiplier
      blend:       0.09,  // finger↔palm smooth-union (0 = crisp, higher = webbed)
      palmRound:   0.135, // palm size / roundness (× hand span)
      edgeSoft:    2.00,  // outline softness multiplier
      fill:        0.87,  // body opacity
      rim:         2.76,  // edge-glow strength
      halo:        0.29,  // soft outer halo strength
      hue:         0.56,  // colour hue (0..1)
      sat:         0.72,  // saturation
      light:       0.27   // lightness
    };
    const handParams = Object.assign({}, HAND_DEFAULTS);

    // ══════════════════════════════════════════════
    // RENDERER + CAMERA
    // ══════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(PIXEL_RATIO);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    camera.position.z = 10;

    // ── Trail framebuffers (feedback for persistence) ──
    const mkRT = () => new THREE.WebGLRenderTarget(
      Math.round(W * RT_SCALE),
      Math.round(H * RT_SCALE),
      { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat }
    );
    let rtA = mkRT(), rtB = mkRT();
    let readRT = rtA, writeRT = rtB;

    const fullGeo = new THREE.PlaneGeometry(W, H);

    // fade previous frame
    const fadeMat = new THREE.ShaderMaterial({
      uniforms: { tPrev: { value: null }, fade: { value: 0.94 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tPrev; uniform float fade; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tPrev,vUv)*fade; }`,
      transparent: true, depthWrite: false
    });
    const fadeQuad = new THREE.Mesh(fullGeo, fadeMat);

    const trailScene = new THREE.Scene();
    const trailCam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    trailCam.position.z = 10;
    trailScene.add(fadeQuad);

    // composite trail to screen with global breathing glow
    const compMat = new THREE.ShaderMaterial({
      uniforms: { tTrail: { value: null }, uBreath: { value: 1.0 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tTrail; uniform float uBreath; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tTrail,vUv) * uBreath; }`,
      transparent: true, depthWrite: false
    });
    const compQuad = new THREE.Mesh(fullGeo.clone(), compMat);
    const compScene = new THREE.Scene();
    compScene.add(compQuad);

    // ══════════════════════════════════════════════
    // SHARED GLSL (hash + curl-noise flow field)
    // ══════════════════════════════════════════════
    const GLSL_HASH = `
      float hash11(float p){ p=fract(p*0.1031); p*=p+33.33; p*=p+p; return fract(p); }
      float hash12(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
    `;
    const GLSL_FLOW = `
      float flowAngle(float x,float y,float t,float s){
        float v = sin(x*s*1.1+t*0.3)+sin(y*s*0.9+t*0.2);
        v += sin(x*s*0.7-t*0.25)+cos(y*s*1.3+t*0.35);
        v += sin((x+y)*s*0.5+t*0.15);
        float s2=s*2.5;
        v += (sin(x*s2+t*0.6)+cos(y*s2*1.2-t*0.5))*0.5;
        v += sin((x-y)*s2*0.8+t*0.45)*0.4;
        float s3=s*6.0;
        v += (sin(x*s3+t*1.2)+sin(y*s3+t*0.9))*0.2;
        return v*0.65;
      }
      float curlX(float x,float y,float t,float s){ float e=1.5; return (flowAngle(x,y+e,t,s)-flowAngle(x,y-e,t,s))/(e*2.0); }
      float curlY(float x,float y,float t,float s){ float e=1.5; return -(flowAngle(x+e,y,t,s)-flowAngle(x-e,y,t,s))/(e*2.0); }
    `;

    // ══════════════════════════════════════════════
    // HAND SILHOUETTE SDF (shared: hand render + particle edge-interaction)
    // ══════════════════════════════════════════════
    const FINGERS = [
      { idx: [1, 2, 3, 4],     base: 0.17  }, // thumb (fatter)
      { idx: [5, 6, 7, 8],     base: 0.14  }, // index
      { idx: [9, 10, 11, 12],  base: 0.145 }, // middle
      { idx: [13, 14, 15, 16], base: 0.135 }, // ring
      { idx: [17, 18, 19, 20], base: 0.115 }  // pinky
    ];
    const PALM = [0, 1, 5, 9, 13, 17];    // boundary: wrist→thumb base→knuckles→pinky
    // (finger taper & palm-round are now live uniforms — see HAND_DEFAULTS)

    // Emit the SDF body (declares float d) for point-array P and scale S,
    // using literal indices only (GLSL ES 1.00 safe). The point var is `p`.
    // P=points array, S=hand-span uniform. U = uniform names:
    //   thick (global), palm (round), blend (finger↔palm smin), baseMul/tipMul (taper)
    function genSDFBody(P, S, U) {
      let g = 'float d = 1e5;\n';
      for (const f of FINGERS) {
        const rb = f.base.toFixed(4);
        for (let s = 0; s < 3; s++) {
          const a = f.idx[s], b = f.idx[s+1];
          const fa = (s/3).toFixed(3), fb = ((s+1)/3).toFixed(3);
          g += `d = min(d, sdRoundCone(p, ${P}[${a}], ${P}[${b}], `
            +  `${rb}*${S}*${U.thick}*mix(${U.baseMul},${U.tipMul},${fa}), `
            +  `${rb}*${S}*${U.thick}*mix(${U.baseMul},${U.tipMul},${fb})));\n`;
        }
      }
      g += `float dp = dot(p-${P}[${PALM[0]}], p-${P}[${PALM[0]}]); float sp = 1.0;\n`;
      for (let i = 0, j = PALM.length - 1; i < PALM.length; j = i, i++) {
        const vi = PALM[i], vj = PALM[j];
        g += `{ vec2 e=${P}[${vj}]-${P}[${vi}]; vec2 w=p-${P}[${vi}];`
          +  ` vec2 b=w-e*clamp(dot(w,e)/dot(e,e),0.0,1.0); dp=min(dp,dot(b,b));`
          +  ` bvec3 c=bvec3(p.y>=${P}[${vi}].y, p.y<${P}[${vj}].y, e.x*w.y>e.y*w.x);`
          +  ` if(all(c)||all(not(c))) sp=-sp; }\n`;
      }
      // fingers blend into the palm via smooth-union (k≈0 → crisp hard union)
      g += `float dPalm = sp*sqrt(dp) - ${U.palm}*${S};\n`;
      g += `d = smin(d, dPalm, max(${U.blend}*${S}, 0.5));\n`;
      return g;
    }
    const SD_ROUNDCONE = `float sdRoundCone(vec2 p, vec2 a, vec2 b, float ra, float rb){ vec2 ba=b-a; float l2=max(dot(ba,ba),1e-4); float t=clamp(dot(p-a,ba)/l2,0.0,1.0); return length(p-(a+t*ba))-mix(ra,rb,t); }`;
    const SMIN = `float smin(float a, float b, float k){ float h=clamp(0.5+0.5*(b-a)/k,0.0,1.0); return mix(b,a,h)-k*h*(1.0-h); }`;
    const INBOX = `bool inBox(vec2 p, vec4 b){ return p.x>=b.x && p.y>=b.y && p.x<=b.z && p.y<=b.w; }`;
    const genSDF = (fn, P, S, U) => `float ${fn}(vec2 p){ ${genSDFBody(P, S, U)} return d; }`;
    // edge-repulsion block: push a particle along the SDF gradient, strongest inside
    const genPush = (sdf) => `
          { float d0 = ${sdf}(pos);
            if (d0 < R) {
              float eps = max(scl*0.02, 1.5);
              vec2 g = vec2(${sdf}(pos+vec2(eps,0.0)) - ${sdf}(pos-vec2(eps,0.0)),
                            ${sdf}(pos+vec2(0.0,eps)) - ${sdf}(pos-vec2(0.0,eps)));
              float glen = length(g); if (glen > 1e-4) g /= glen;
              float inf = clamp(1.0 - d0/R, 0.0, 1.6);
              repel += g * inf * uRepelStr;
            } }`;

    // Shared hand state — written by detectHands, read by the sim each frame.
    const handPts = [
      Array.from({ length: 21 }, () => new THREE.Vector2()),
      Array.from({ length: 21 }, () => new THREE.Vector2())
    ];
    const handInfo = [
      { on: 0, scale: 100, box: new THREE.Vector4() },
      { on: 0, scale: 100, box: new THREE.Vector4() }
    ];

    // Hand smoothing — lerp toward the latest detection each frame to kill
    // MediaPipe's per-sample jitter and interpolate between detections.
    const handTarget = [
      Array.from({ length: 21 }, () => new THREE.Vector2()),
      Array.from({ length: 21 }, () => new THREE.Vector2())
    ];
    const handActive = [false, false];   // detected in the latest sample
    const handPresent = [false, false];  // currently shown / being smoothed

    // ══════════════════════════════════════════════
    // GPU PARTICLE SIMULATION
    // ══════════════════════════════════════════════
    // texPos : xy = position (centered scene coords), zw = velocity
    // texData: x = age, y = maxAge, z = excitation (0..1 glow), w = hue
    const gpu = new GPUComputationRenderer(TEX_SIZE, TEX_SIZE, renderer);

    const pos0 = gpu.createTexture();
    const data0 = gpu.createTexture();
    (function seedInitialState() {
      const pd = pos0.image.data, dd = data0.image.data;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        pd[i*4]   = (Math.random() - 0.5) * W;
        pd[i*4+1] = (Math.random() - 0.5) * H;
        pd[i*4+2] = (Math.random() - 0.5) * 0.3;
        pd[i*4+3] = (Math.random() - 0.5) * 0.3;
        const maxAge = 6 + Math.random() * 14; // longer lives — algae persist
        // weighted color pick: 25% teal, 45% cyan, 10% blue, 10% purple, 10% green
        const roll = Math.random();
        let hue;
        if (roll < 0.25) hue = 0.47 + Math.random() * 0.03;
        else if (roll < 0.70) hue = 0.50 + Math.random() * 0.03;
        else if (roll < 0.80) hue = 0.58 + Math.random() * 0.04;
        else if (roll < 0.90) hue = 0.72 + Math.random() * 0.06;
        else hue = 0.38 + Math.random() * 0.04;
        dd[i*4]   = Math.random() * maxAge; // random starting age → staggered lifecycles
        dd[i*4+1] = maxAge;
        dd[i*4+2] = 0;
        dd[i*4+3] = hue;
      }
    })();

    // ── Position/velocity step ──
    const posFrag = `
      uniform float uTime, uDt, uW, uH, uFlowStr, uFlowScale, uFlowSpeed, uRadBase;
      uniform float uDamping, uJitter, uRepelRad, uRepelStr;
      uniform float uCurrentStr, uCurrentAngle, uCurrentWobble, uWobbleSpeed, uLaneFreq, uLaneAmp, uMeander, uMeanderFreq;
      uniform float uHandThick, uHandPalm, uHandBlend, uHandBaseMul, uHandTipMul;
      uniform vec2 uHand0Pts[21]; uniform float uHand0Scale, uHand0On; uniform vec4 uHand0Box;
      uniform vec2 uHand1Pts[21]; uniform float uHand1Scale, uHand1On; uniform vec4 uHand1Box;
      uniform vec2 uMouse; uniform float uMouseOn;
      ${GLSL_HASH}
      ${GLSL_FLOW}
      ${SD_ROUNDCONE}
      ${SMIN}
      ${INBOX}
      ${genSDF('handSDF0', 'uHand0Pts', 'uHand0Scale', { thick:'uHandThick', palm:'uHandPalm', blend:'uHandBlend', baseMul:'uHandBaseMul', tipMul:'uHandTipMul' })}
      ${genSDF('handSDF1', 'uHand1Pts', 'uHand1Scale', { thick:'uHandThick', palm:'uHandPalm', blend:'uHandBlend', baseMul:'uHandBaseMul', tipMul:'uHandTipMul' })}
      void main(){
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 P = texture2D(texPos, uv);
        vec4 D = texture2D(texData, uv);
        float age = D.x; float maxAge = D.y;
        float sb = uTime*13.31 + hash12(uv)*101.7;

        // respawn at random position when life ends
        if (age + uDt >= maxAge) {
          float nx  = (hash11(sb+1.1)-0.5)*uW;
          float ny  = (hash11(sb+2.2)-0.5)*uH;
          float nvx = (hash11(sb+3.3)-0.5)*0.3;
          float nvy = (hash11(sb+4.4)-0.5)*0.3;
          gl_FragColor = vec4(nx, ny, nvx, nvy);
          return;
        }

        vec2 pos = P.xy; vec2 vel = P.zw;

        // personal slow wander (curl noise — kept low; this is each particle's drift)
        float t = uTime*uFlowSpeed;
        float fx = curlX(pos.x, pos.y, t, uFlowScale)*uFlowStr;
        float fy = curlY(pos.x, pos.y, t, uFlowScale)*uFlowStr;

        // shared laminar current — flows one direction, but split into parallel
        // laminae: speed varies across the stream so adjacent layers shear past each
        // other (a real velocity profile, not one rigid sheet). Angle breathes slowly.
        float cang = uCurrentAngle + uCurrentWobble*(sin(uTime*0.07*uWobbleSpeed) + 0.5*sin(uTime*0.017*uWobbleSpeed));
        vec2 dir  = vec2(cos(cang), sin(cang));
        vec2 perp = vec2(-dir.y, dir.x);
        float along = dot(pos, dir);                        // distance along the stream
        float lane  = dot(pos, perp);                       // distance across the stream
        // waves, not a straight comb: meander the laminae side-to-side, and let the
        // cross term bunch them into thick/thin bands as they run downstream
        lane += uMeander * (sin(along*uMeanderFreq + uTime*0.04)
                          + 0.6*sin(lane*uLaneFreq*0.5 - along*uMeanderFreq*1.7 + uTime*0.03));
        float prof = sin(lane*uLaneFreq + uTime*0.05)
                   + 0.5*sin(lane*uLaneFreq*2.3 - uTime*0.03);
        float speed = uCurrentStr * (1.0 + uLaneAmp*prof);  // each lamina its own speed
        vec2 current = dir * speed;

        float seed = hash12(uv)*1000.0;
        float radNoise = 0.7 + 0.6*(sin(seed*3.7 + uTime*2.0)*0.5+0.5);

        // disturbance: repel from the HAND EDGE (SDF gradient), + mouse fallback
        vec2 repel = vec2(0.0);
        if (uHand0On > 0.5 && inBox(pos, uHand0Box)) { float scl = uHand0Scale; float R = max(scl*uRepelRad, 30.0)*radNoise; ${genPush('handSDF0')} }
        if (uHand1On > 0.5 && inBox(pos, uHand1Box)) { float scl = uHand1Scale; float R = max(scl*uRepelRad, 30.0)*radNoise; ${genPush('handSDF1')} }
        if (uMouseOn > 0.5) {
          vec2 dd = pos - uMouse; float dist = length(dd); float rad = uRadBase*radNoise;
          if (dist < rad && dist > 0.1) { float inf = 1.0 - dist/rad; repel += (dd/dist)*inf*uRepelStr; }
        }

        // shimmer jitter (subtle — keep motion gentle)
        float jb = uTime*57.0 + hash12(uv)*123.0;
        float jx = (hash11(jb+0.7)-0.5)*uJitter;
        float jy = (hash11(jb+9.1)-0.5)*uJitter;

        vel += (current + vec2(fx,fy) + repel + vec2(jx,jy)) * uDt * 60.0;
        vel *= uDamping;
        pos += vel;

        // wrap around edges
        float hw = uW*0.5+50.0, hh = uH*0.5+50.0;
        if (pos.x < -hw) pos.x += uW+100.0;
        if (pos.x >  hw) pos.x -= uW+100.0;
        if (pos.y < -hh) pos.y += uH+100.0;
        if (pos.y >  hh) pos.y -= uH+100.0;

        gl_FragColor = vec4(pos, vel);
      }
    `;

    // ── Age / excitation / hue step ──
    const dataFrag = `
      uniform float uTime, uDt, uRadBase, uRepelRad, uLifeMin, uLifeRange;
      uniform float uHandThick, uHandPalm, uHandBlend, uHandBaseMul, uHandTipMul;
      uniform vec2 uHand0Pts[21]; uniform float uHand0Scale, uHand0On; uniform vec4 uHand0Box;
      uniform vec2 uHand1Pts[21]; uniform float uHand1Scale, uHand1On; uniform vec4 uHand1Box;
      uniform vec2 uMouse; uniform float uMouseOn;
      ${GLSL_HASH}
      ${SD_ROUNDCONE}
      ${SMIN}
      ${INBOX}
      ${genSDF('handSDF0', 'uHand0Pts', 'uHand0Scale', { thick:'uHandThick', palm:'uHandPalm', blend:'uHandBlend', baseMul:'uHandBaseMul', tipMul:'uHandTipMul' })}
      ${genSDF('handSDF1', 'uHand1Pts', 'uHand1Scale', { thick:'uHandThick', palm:'uHandPalm', blend:'uHandBlend', baseMul:'uHandBaseMul', tipMul:'uHandTipMul' })}
      void main(){
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 P = texture2D(texPos, uv);
        vec4 D = texture2D(texData, uv);
        float age=D.x; float maxAge=D.y; float exc=D.z; float hue=D.w;
        float sb = uTime*13.31 + hash12(uv)*101.7;

        // respawn — new lifespan + fresh color
        if (age + uDt >= maxAge){
          float newMax = uLifeMin + hash11(sb+5.5)*uLifeRange;
          float roll = hash11(sb+6.6);
          float hb = hash11(sb+7.7);
          float nh;
          if (roll<0.25) nh=0.47+hb*0.03;
          else if (roll<0.70) nh=0.50+hb*0.03;
          else if (roll<0.80) nh=0.58+hb*0.04;
          else if (roll<0.90) nh=0.72+hb*0.06;
          else nh=0.38+hb*0.04;
          gl_FragColor = vec4(0.0, newMax, 0.0, nh);
          return;
        }

        // excite strongest along the hand EDGE (|SDF| small), + mouse fallback
        vec2 pos = P.xy;
        float seed = hash12(uv)*1000.0;
        float radNoise = 0.7 + 0.6*(sin(seed*3.7 + uTime*2.0)*0.5+0.5);
        float dIn = 0.0;
        if (uHand0On>0.5 && inBox(pos,uHand0Box)){ float scl=uHand0Scale; float R=max(scl*uRepelRad,30.0)*radNoise; float d0=handSDF0(pos); if(d0<R) dIn += clamp(1.0-abs(d0)/(R*0.7),0.0,1.0); }
        if (uHand1On>0.5 && inBox(pos,uHand1Box)){ float scl=uHand1Scale; float R=max(scl*uRepelRad,30.0)*radNoise; float d0=handSDF1(pos); if(d0<R) dIn += clamp(1.0-abs(d0)/(R*0.7),0.0,1.0); }
        if (uMouseOn>0.5){ vec2 dd=pos-uMouse; float dist=length(dd); float rad=uRadBase*radNoise; if(dist<rad&&dist>0.1) dIn += 1.0-dist/rad; }

        if (dIn > 0.0) exc = min(1.0, exc + dIn*0.10);
        else exc *= 0.95;

        age += uDt;
        gl_FragColor = vec4(age, maxAge, exc, hue);
      }
    `;

    const posVar = gpu.addVariable('texPos', posFrag, pos0);
    const dataVar = gpu.addVariable('texData', dataFrag, data0);
    gpu.setVariableDependencies(posVar, [posVar, dataVar]);
    gpu.setVariableDependencies(dataVar, [posVar, dataVar]);

    // shared interaction uniforms (hand-edge SDF repulsion + mouse fallback)
    const handUniforms = () => ({
      uHand0Pts: { value: handPts[0] }, uHand0Scale: { value: 100 }, uHand0On: { value: 0 }, uHand0Box: { value: new THREE.Vector4() },
      uHand1Pts: { value: handPts[1] }, uHand1Scale: { value: 100 }, uHand1On: { value: 0 }, uHand1Box: { value: new THREE.Vector4() },
      uMouse: { value: new THREE.Vector2() }, uMouseOn: { value: 0 }
    });
    Object.assign(posVar.material.uniforms, {
      uTime: { value: 0 }, uDt: { value: 0.016 },
      uW: { value: W }, uH: { value: H },
      uFlowStr: { value: params.flowStr }, uFlowScale: { value: FLOW_SCALE },
      uFlowSpeed: { value: params.flowSpeed }, uRadBase: { value: 60 },
      uCurrentStr: { value: params.currentStr }, uCurrentAngle: { value: params.currentAngle }, uCurrentWobble: { value: params.currentWobble },
      uWobbleSpeed: { value: params.wobbleSpeed },
      uLaneFreq: { value: params.laneFreq }, uLaneAmp: { value: params.laneAmp },
      uMeander: { value: params.meander }, uMeanderFreq: { value: params.meanderFreq },
      uDamping: { value: params.damping }, uJitter: { value: params.jitter },
      uRepelRad: { value: params.repelRad }, uRepelStr: { value: params.repelStr },
      uHandThick: { value: handParams.fingerThick }, uHandPalm: { value: handParams.palmRound },
      uHandBlend: { value: handParams.blend }, uHandBaseMul: { value: handParams.baseMul }, uHandTipMul: { value: handParams.tipMul },
      ...handUniforms()
    });
    Object.assign(dataVar.material.uniforms, {
      uTime: { value: 0 }, uDt: { value: 0.016 },
      uRadBase: { value: 60 }, uRepelRad: { value: params.repelRad },
      uLifeMin: { value: params.lifeMin }, uLifeRange: { value: params.lifeRange },
      uHandThick: { value: handParams.fingerThick }, uHandPalm: { value: handParams.palmRound },
      uHandBlend: { value: handParams.blend }, uHandBaseMul: { value: handParams.baseMul }, uHandTipMul: { value: handParams.tipMul },
      ...handUniforms()
    });

    const gpuErr = gpu.init();
    if (gpuErr !== null) console.error('GPUComputationRenderer error:', gpuErr);

    // ── Render material: reads particle state straight from the sim textures ──
    const refs = new Float32Array(PARTICLE_COUNT * 2);
    for (let j = 0, k = 0; j < TEX_SIZE; j++) {
      for (let i = 0; i < TEX_SIZE; i++, k++) {
        refs[k*2]   = (i + 0.5) / TEX_SIZE;
        refs[k*2+1] = (j + 0.5) / TEX_SIZE;
      }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(PARTICLE_COUNT * 3), 3));
    geo.setAttribute('reference', new THREE.BufferAttribute(refs, 2));

    const pMat = new THREE.ShaderMaterial({
      uniforms: {
        texPos: { value: null },
        texData: { value: null },
        uTime: { value: 0 },
        uBaseGlow: { value: params.baseGlow },
        uExcGlow: { value: params.excGlow },
        uAlpha: { value: params.alpha },
        uHueShift: { value: params.hueShift },
        uSat: { value: params.sat },
        uPointSize: { value: params.pointSize },
        uSizeGlow: { value: params.sizeGlow }
      },
      vertexShader: `
        uniform sampler2D texPos;
        uniform sampler2D texData;
        uniform float uTime, uBaseGlow, uExcGlow, uAlpha, uPointSize, uSizeGlow;
        attribute vec2 reference;
        varying float vAlpha;
        varying float vHue;
        float hash12(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
        void main() {
          vec4 P = texture2D(texPos, reference);
          vec4 D = texture2D(texData, reference);
          float age=D.x; float maxAge=D.y; float exc=D.z; float hue=D.w;
          float ageNorm = age/maxAge;
          float fadeIn = min(1.0, ageNorm/0.1);
          float fadeOut = min(1.0, (1.0-ageNorm)/0.2);
          float ageFade = fadeIn*fadeOut;
          // breathing ambient: each particle gently pulses at its own rate
          float seed = hash12(reference)*1000.0;
          float breath = uBaseGlow + 0.05*sin(uTime*(0.3 + seed*0.0004) + seed);
          float life = ageFade * (breath + exc*uExcGlow);
          vAlpha = life * uAlpha;
          vHue = hue;
          gl_PointSize = uPointSize + life * uSizeGlow; // brighter = bigger glow
          gl_Position = projectionMatrix * modelViewMatrix * vec4(P.xy, 0.0, 1.);
        }
      `,
      fragmentShader: `
        uniform float uHueShift, uSat;
        varying float vAlpha;
        varying float vHue;
        vec3 hue2rgb(float h) {
          h = fract(h);
          float r = abs(h*6.-3.)-1.;
          float g = 2.-abs(h*6.-2.);
          float b = 2.-abs(h*6.-4.);
          return clamp(vec3(r,g,b),0.,1.);
        }
        void main() {
          float d = length(gl_PointCoord - .5) * 2.;
          if (d > 1.) discard;
          float a = (1.-d*d) * vAlpha;
          float h = vHue + uHueShift;
          vec3 c = hue2rgb(h);
          // saturation: pull toward luma when desaturated
          float luma = dot(c, vec3(0.299, 0.587, 0.114));
          c = mix(vec3(luma), c, uSat);
          // when excited, push toward bright white-cyan
          c = mix(c, vec3(.6, .95, .9), vAlpha * 0.4);
          gl_FragColor = vec4(c, a);
        }
      `,
      transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particlePoints = new THREE.Points(geo, pMat);
    particlePoints.frustumCulled = false; // positions live in the texture, not the attribute
    scene.add(particlePoints);

    // ══════════════════════════════════════════════
    // INTERACTION POINTS (hands + mouse fallback)
    // ══════════════════════════════════════════════
    let hasHands = false;

    // ── Mouse fallback ──
    let mouseX = 0, mouseY = 0, mouseIn = false;
    window.addEventListener('mousemove', e => {
      mouseX = e.clientX - W/2; mouseY = -(e.clientY - H/2); mouseIn = true;
    });
    window.addEventListener('mouseleave', () => { mouseIn = false; });
    window.addEventListener('touchmove', e => {
      mouseX = e.touches[0].clientX - W/2; mouseY = -(e.touches[0].clientY - H/2); mouseIn = true;
    }, { passive: true });
    window.addEventListener('touchend', () => { mouseIn = false; });

    // ── Hand tracking ──
    let handLandmarker = null;
    let videoReady = false;
    let lastDetect = 0;
    const videoEl = document.getElementById('video');

    // ── Solid glowing hand: render the silhouette SDF as a filled glow ──
    const handFrag = `
      precision highp float;
      uniform vec2 uPts[21];
      uniform float uScale;   // hand span (px)
      uniform float uAA;      // edge softness (px)
      uniform float uThick, uPalmRound, uBlend, uBaseMul, uTipMul, uFill, uRim, uHalo;
      uniform vec3 uColor;
      varying vec2 vWorld;
      ${SD_ROUNDCONE}
      ${SMIN}
      ${genSDF('handSDF', 'uPts', 'uScale', { thick:'uThick', palm:'uPalmRound', blend:'uBlend', baseMul:'uBaseMul', tipMul:'uTipMul' })}
      void main(){
        vec2 p = vWorld;
        float d = handSDF(p);
        float inside = smoothstep(uAA, -uAA, d);             // crisp solid fill
        float rim    = smoothstep(0.05*uScale, 0.0, abs(d)); // bright edge band
        float outer  = exp(max(d, 0.0) / -(0.05*uScale));    // soft halo
        vec3 col = uColor * (0.5 + rim*uRim);
        float alpha = inside*uFill + outer*uHalo;
        if (alpha < 0.003) discard;
        gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
      }
    `;
    const handVert = `
      varying vec2 vWorld;
      void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xy;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `;

    function makeHandMat(handIdx) {
      return new THREE.ShaderMaterial({
        uniforms: {
          uPts:   { value: handPts[handIdx] }, // shared with the particle sim
          uScale: { value: 100 },
          uAA:    { value: 2 },
          uThick: { value: handParams.fingerThick }, uPalmRound: { value: handParams.palmRound },
          uBlend: { value: handParams.blend }, uBaseMul: { value: handParams.baseMul }, uTipMul: { value: handParams.tipMul },
          uFill:  { value: handParams.fill }, uRim: { value: handParams.rim }, uHalo: { value: handParams.halo },
          uColor: { value: new THREE.Color() }
        },
        vertexShader: handVert,
        fragmentShader: handFrag,
        transparent: true, depthWrite: false, depthTest: false,
        blending: THREE.NormalBlending
      });
    }

    // a bounding quad per hand; the SDF only runs over the hand's box
    const handQuadGeo = new THREE.PlaneGeometry(1, 1);
    const handScene = new THREE.Scene();
    const handMeshes = [];
    for (let h = 0; h < 2; h++) {
      const m = new THREE.Mesh(handQuadGeo, makeHandMat(h));
      m.frustumCulled = false;
      m.visible = false;
      handScene.add(m);
      handMeshes.push(m);
    }

    // store the latest raw detection as the smoothing target
    function setHandTarget(handIdx, hand) {
      const t = handTarget[handIdx];
      for (let j = 0; j < 21; j++) {
        t[j].set((1 - hand[j].x) * W - W/2, -(hand[j].y * H - H/2));
      }
      handActive[handIdx] = true;
    }

    // rebuild geometry + sim box from the SMOOTHED points (called every frame)
    function updateHandGeom(handIdx) {
      const mesh = handMeshes[handIdx];
      const u = mesh.material.uniforms;
      const pts = handPts[handIdx];
      let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
      let wristX = 0, wristY = 0, midX = 0, midY = 0;
      for (let j = 0; j < 21; j++) {
        const x = pts[j].x, y = pts[j].y;
        if (j === 0) { wristX = x; wristY = y; }
        if (j === 9) { midX = x; midY = y; }
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
      // hand span = wrist (0) → middle knuckle (9)
      const dx = midX - wristX, dy = midY - wristY;
      const span = Math.max(40, Math.sqrt(dx*dx + dy*dy));
      u.uScale.value = span;
      u.uAA.value = Math.max(1.5, 0.02 * span) * handParams.edgeSoft;

      const margin = 0.5 * span; // room for palm rounding + tip radius + halo
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      mesh.position.set(cx, cy, 0);
      mesh.scale.set((maxX - minX) + margin*2, (maxY - minY) + margin*2, 1);
      mesh.visible = true;

      // share state with the particle sim (edge-interaction)
      const info = handInfo[handIdx];
      info.on = 1; info.scale = span;
      info.box.set(minX - margin, minY - margin, maxX + margin, maxY + margin);
    }

    function hideHandMesh(handIdx) {
      handMeshes[handIdx].visible = false;
      handInfo[handIdx].on = 0;
    }

    // per-frame smoothing: ease the rendered/sim points toward the latest sample
    function updateHands() {
      for (let h = 0; h < 2; h++) {
        if (handActive[h]) {
          const pts = handPts[h], t = handTarget[h];
          if (!handPresent[h]) {                       // just appeared → snap, don't glide in
            for (let j = 0; j < 21; j++) pts[j].copy(t[j]);
            handPresent[h] = true;
          } else {
            for (let j = 0; j < 21; j++) pts[j].lerp(t[j], params.handSmooth);
          }
          updateHandGeom(h);
        } else if (handPresent[h]) {
          handPresent[h] = false;
          hideHandMesh(h);
        }
      }
    }

    async function startHands() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' }
        });
        videoEl.srcObject = stream;
        await videoEl.play();
        videoReady = true;
        document.getElementById('hint').textContent = 'move your hand to see magic';
      } catch (e) {
        document.getElementById('hint').textContent = 'move your mouse to see magic';
        return;
      }

      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO", numHands: 2,
          minHandDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
      } catch (e) { return; }
    }
    startHands();

    function detectHands() {
      if (!handLandmarker || !videoReady) return;
      const now = performance.now();
      if (now - lastDetect < params.detectMs) return;
      lastDetect = now;

      let results;
      try { results = handLandmarker.detectForVideo(videoEl, now); } catch(e) { return; }

      const nHands = (results.landmarks && results.landmarks.length) || 0;

      hasHands = nHands > 0;
      handActive[0] = false; handActive[1] = false;
      for (let h = 0; h < nHands && h < 2; h++) {
        setHandTarget(h, results.landmarks[h]); // store smoothing target only
      }
    }

    // Push live-tunable params into the GPU uniforms (cheap; called each frame).
    function applyParams() {
      const pu = posVar.material.uniforms, du = dataVar.material.uniforms;
      pu.uFlowStr.value = params.flowStr;   pu.uFlowSpeed.value = params.flowSpeed;
      pu.uCurrentStr.value = params.currentStr; pu.uCurrentAngle.value = params.currentAngle; pu.uCurrentWobble.value = params.currentWobble;
      pu.uWobbleSpeed.value = params.wobbleSpeed;
      pu.uLaneFreq.value = params.laneFreq; pu.uLaneAmp.value = params.laneAmp;
      pu.uMeander.value = params.meander; pu.uMeanderFreq.value = params.meanderFreq;
      pu.uDamping.value = params.damping;   pu.uJitter.value = params.jitter;
      pu.uRepelRad.value = params.repelRad; pu.uRepelStr.value = params.repelStr;
      du.uRepelRad.value = params.repelRad;
      du.uLifeMin.value = params.lifeMin; du.uLifeRange.value = params.lifeRange;
      pMat.uniforms.uBaseGlow.value = params.baseGlow;
      pMat.uniforms.uExcGlow.value = params.excGlow;
      pMat.uniforms.uAlpha.value = params.alpha;
      pMat.uniforms.uHueShift.value = params.hueShift;
      pMat.uniforms.uSat.value = params.sat;
      pMat.uniforms.uPointSize.value = params.pointSize;
      pMat.uniforms.uSizeGlow.value = params.sizeGlow;
    }

    // Push live hand appearance/shape params into all relevant uniforms.
    const _handColor = new THREE.Color();
    function applyHandParams() {
      const pu = posVar.material.uniforms, du = dataVar.material.uniforms;
      for (const U of [pu, du]) {
        U.uHandThick.value = handParams.fingerThick; U.uHandPalm.value = handParams.palmRound;
        U.uHandBlend.value = handParams.blend; U.uHandBaseMul.value = handParams.baseMul; U.uHandTipMul.value = handParams.tipMul;
      }
      _handColor.setHSL(handParams.hue, handParams.sat, handParams.light);
      for (const m of handMeshes) {
        const u = m.material.uniforms;
        u.uThick.value = handParams.fingerThick; u.uPalmRound.value = handParams.palmRound;
        u.uBlend.value = handParams.blend; u.uBaseMul.value = handParams.baseMul; u.uTipMul.value = handParams.tipMul;
        u.uFill.value = handParams.fill; u.uRim.value = handParams.rim; u.uHalo.value = handParams.halo;
        u.uColor.value.copy(_handColor);
      }
    }

    // Push hand/mouse interaction state into a sim material's uniforms.
    function setHandUniforms(U) {
      U.uHand0On.value = handInfo[0].on; U.uHand0Scale.value = handInfo[0].scale; U.uHand0Box.value.copy(handInfo[0].box);
      U.uHand1On.value = handInfo[1].on; U.uHand1Scale.value = handInfo[1].scale; U.uHand1Box.value.copy(handInfo[1].box);
      U.uMouse.value.set(mouseX, mouseY);
      U.uMouseOn.value = hasHands ? 0.0 : (mouseIn ? 1.0 : 0.0);
    }

    // ══════════════════════════════════════════════
    // ANIMATE
    // ══════════════════════════════════════════════
    let time = 0;
    let hintVisible = true;
    let idleTime = 0;
    const hintEl = document.getElementById('hint');

    function animate() {
      requestAnimationFrame(animate);
      const dt = 0.016;
      time += dt;

      detectHands();
      updateHands();   // smooth hand toward latest detection (kills MediaPipe jitter)

      // breathing: trail persistence oscillates → whole field gently pulses
      fadeMat.uniforms.fade.value = params.trail + 0.012 * Math.sin(time * 0.3);

      // ── Feed sim params + hand/mouse interaction state to the GPU ──
      const pu = posVar.material.uniforms, du = dataVar.material.uniforms;
      pu.uTime.value = time; pu.uDt.value = dt; pu.uRadBase.value = MOUSE_RAD;
      du.uTime.value = time; du.uDt.value = dt; du.uRadBase.value = MOUSE_RAD;
      applyParams();
      applyHandParams();
      setHandUniforms(pu);
      setHandUniforms(du);

      // ── Step the simulation on the GPU ──
      gpu.compute();
      pMat.uniforms.texPos.value = gpu.getCurrentRenderTarget(posVar).texture;
      pMat.uniforms.texData.value = gpu.getCurrentRenderTarget(dataVar).texture;
      pMat.uniforms.uTime.value = time;

      // hint text: hide on activity, show after idle
      if (hasHands || mouseIn) {
        idleTime = 0;
        if (hintVisible) { hintEl.style.opacity = '0'; hintVisible = false; }
      } else {
        idleTime += dt;
        if (idleTime > 8 && !hintVisible) { hintEl.style.opacity = '1'; hintVisible = true; }
      }

      // ── Render with trails ──
      // 1. trail buffer: fade previous frame, draw fresh particles on top
      fadeMat.uniforms.tPrev.value = readRT.texture;
      renderer.setRenderTarget(writeRT);
      renderer.clear();
      renderer.render(trailScene, trailCam);  // faded previous frame
      renderer.autoClear = false;
      renderer.render(scene, camera);          // live particles added (additive)
      renderer.autoClear = true;
      renderer.setRenderTarget(null);

      // 2. composite trail buffer to screen
      //    trail buffer = accumulated fading trails + bright live particles
      compMat.uniforms.tTrail.value = writeRT.texture;
      renderer.render(compScene, trailCam);

      // 3. solid glowing hand on top — crisp, no trail smear
      renderer.autoClear = false;
      renderer.render(handScene, camera);
      renderer.autoClear = true;

      [readRT, writeRT] = [writeRT, readRT];
    }

    // ══════════════════════════════════════════════
    // RESIZE
    // ══════════════════════════════════════════════
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera.left = -w/2; camera.right = w/2;
      camera.top = h/2; camera.bottom = -h/2;
      camera.updateProjectionMatrix();
      trailCam.left = -w/2; trailCam.right = w/2;
      trailCam.top = h/2; trailCam.bottom = -h/2;
      trailCam.updateProjectionMatrix();
    });

    animate();
  </script>
</body>
</html>
