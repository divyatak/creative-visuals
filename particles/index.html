<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bioluminescent Flow</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    #back {
      position: fixed; top: 20px; left: 20px;
      color: rgba(255,255,255,0.35); font: 14px monospace;
      text-decoration: none; z-index: 10; cursor: pointer;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.8); }
    #phase-label {
      position: fixed; bottom: 24px; right: 24px;
      font: 11px monospace; letter-spacing: 1px;
      color: rgba(255,255,255,0.12);
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <a id="back" href="../">&larr; back</a>
  <div id="phase-label"></div>
  <div id="hint" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:20px monospace;color:rgba(255,255,255,0.35);letter-spacing:3px;pointer-events:none;z-index:10;transition:opacity 1.5s;">allow camera to see magic</div>
  <video id="video" playsinline style="display:none;"></video>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
    import { HandLandmarker, FilesetResolver } from
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

    // ══════════════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════════════
    // Particle state lives in two float textures (TEX_SIZE²) and is stepped
    // entirely on the GPU (GPGPU ping-pong). The CPU only updates a handful of
    // uniforms + the interactor positions each frame — no per-particle loop.
    const TEX_SIZE = 158;                       // 158² = 24964 particles (~25k)
    const PARTICLE_COUNT = TEX_SIZE * TEX_SIZE;
    const MAX_POINTS = 130;                      // interactor texture width (hands ~74, mouse 1)
    const PHASE_DURATION = 20;
    const W = window.innerWidth, H = window.innerHeight;

    // ── Device tier (cheap heuristic; Tier 3 refines this with an FPS probe) ──
    const IS_MOBILE = window.matchMedia('(pointer: coarse)').matches || Math.min(W, H) < 600;
    // Trail/feedback buffers are fillrate-heavy; shrink them on phones.
    let RT_SCALE = IS_MOBILE ? 1.0 : Math.min(window.devicePixelRatio, 2);
    const PIXEL_RATIO = IS_MOBILE ? Math.min(window.devicePixelRatio, 1.5)
                                  : Math.min(window.devicePixelRatio, 2);

    const FLOW_STR = 0.35;       // gentle ocean drift strength
    const FLOW_SCALE = 0.0015;   // flow field spatial scale

    // ══════════════════════════════════════════════
    // RENDERER + CAMERA
    // ══════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(PIXEL_RATIO);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    camera.position.z = 10;

    // ── Trail framebuffers (feedback for persistence) ──
    const mkRT = () => new THREE.WebGLRenderTarget(
      Math.round(W * RT_SCALE),
      Math.round(H * RT_SCALE),
      { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat }
    );
    let rtA = mkRT(), rtB = mkRT();
    let readRT = rtA, writeRT = rtB;

    const fullGeo = new THREE.PlaneGeometry(W, H);

    // fade previous frame
    const fadeMat = new THREE.ShaderMaterial({
      uniforms: { tPrev: { value: null }, fade: { value: 0.94 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tPrev; uniform float fade; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tPrev,vUv)*fade; }`,
      transparent: true, depthWrite: false
    });
    const fadeQuad = new THREE.Mesh(fullGeo, fadeMat);

    const trailScene = new THREE.Scene();
    const trailCam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    trailCam.position.z = 10;
    trailScene.add(fadeQuad);

    // composite trail to screen with global breathing glow
    const compMat = new THREE.ShaderMaterial({
      uniforms: { tTrail: { value: null }, uBreath: { value: 1.0 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tTrail; uniform float uBreath; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tTrail,vUv) * uBreath; }`,
      transparent: true, depthWrite: false
    });
    const compQuad = new THREE.Mesh(fullGeo.clone(), compMat);
    const compScene = new THREE.Scene();
    compScene.add(compQuad);

    // ══════════════════════════════════════════════
    // SHARED GLSL (hash + curl-noise flow field)
    // ══════════════════════════════════════════════
    const GLSL_HASH = `
      float hash11(float p){ p=fract(p*0.1031); p*=p+33.33; p*=p+p; return fract(p); }
      float hash12(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
    `;
    const GLSL_FLOW = `
      float flowAngle(float x,float y,float t,float s){
        float v = sin(x*s*1.1+t*0.3)+sin(y*s*0.9+t*0.2);
        v += sin(x*s*0.7-t*0.25)+cos(y*s*1.3+t*0.35);
        v += sin((x+y)*s*0.5+t*0.15);
        float s2=s*2.5;
        v += (sin(x*s2+t*0.6)+cos(y*s2*1.2-t*0.5))*0.5;
        v += sin((x-y)*s2*0.8+t*0.45)*0.4;
        float s3=s*6.0;
        v += (sin(x*s3+t*1.2)+sin(y*s3+t*0.9))*0.2;
        return v*0.65;
      }
      float curlX(float x,float y,float t,float s){ float e=1.5; return (flowAngle(x,y+e,t,s)-flowAngle(x,y-e,t,s))/(e*2.0); }
      float curlY(float x,float y,float t,float s){ float e=1.5; return -(flowAngle(x+e,y,t,s)-flowAngle(x-e,y,t,s))/(e*2.0); }
    `;

    // ══════════════════════════════════════════════
    // GPU PARTICLE SIMULATION
    // ══════════════════════════════════════════════
    // texPos : xy = position (centered scene coords), zw = velocity
    // texData: x = age, y = maxAge, z = excitation (0..1 glow), w = hue
    const gpu = new GPUComputationRenderer(TEX_SIZE, TEX_SIZE, renderer);

    const pos0 = gpu.createTexture();
    const data0 = gpu.createTexture();
    (function seedInitialState() {
      const pd = pos0.image.data, dd = data0.image.data;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        pd[i*4]   = (Math.random() - 0.5) * W;
        pd[i*4+1] = (Math.random() - 0.5) * H;
        pd[i*4+2] = (Math.random() - 0.5) * 0.3;
        pd[i*4+3] = (Math.random() - 0.5) * 0.3;
        const maxAge = 6 + Math.random() * 14; // longer lives — algae persist
        // weighted color pick: 25% teal, 45% cyan, 10% blue, 10% purple, 10% green
        const roll = Math.random();
        let hue;
        if (roll < 0.25) hue = 0.47 + Math.random() * 0.03;
        else if (roll < 0.70) hue = 0.50 + Math.random() * 0.03;
        else if (roll < 0.80) hue = 0.58 + Math.random() * 0.04;
        else if (roll < 0.90) hue = 0.72 + Math.random() * 0.06;
        else hue = 0.38 + Math.random() * 0.04;
        dd[i*4]   = Math.random() * maxAge; // random starting age → staggered lifecycles
        dd[i*4+1] = maxAge;
        dd[i*4+2] = 0;
        dd[i*4+3] = hue;
      }
    })();

    // ── Interactor positions (hands/mouse) passed to the GPU as a data texture ──
    const interactorData = new Float32Array(MAX_POINTS * 4);
    const interactorTex = new THREE.DataTexture(
      interactorData, MAX_POINTS, 1, THREE.RGBAFormat, THREE.FloatType
    );
    interactorTex.needsUpdate = true;

    // ── Position/velocity step ──
    const posFrag = `
      uniform float uTime, uDt, uW, uH, uFlowStr, uFlowScale, uRadBase;
      uniform sampler2D uInteractors;
      uniform int uCount;
      ${GLSL_HASH}
      ${GLSL_FLOW}
      void main(){
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 P = texture2D(texPos, uv);
        vec4 D = texture2D(texData, uv);
        float age = D.x; float maxAge = D.y;
        float sb = uTime*13.31 + hash12(uv)*101.7;

        // respawn at random position when life ends
        if (age + uDt >= maxAge) {
          float nx  = (hash11(sb+1.1)-0.5)*uW;
          float ny  = (hash11(sb+2.2)-0.5)*uH;
          float nvx = (hash11(sb+3.3)-0.5)*0.3;
          float nvy = (hash11(sb+4.4)-0.5)*0.3;
          gl_FragColor = vec4(nx, ny, nvx, nvy);
          return;
        }

        vec2 pos = P.xy; vec2 vel = P.zw;

        // gentle ocean drift (curl noise)
        float t = uTime*0.4;
        float fx = curlX(pos.x, pos.y, t, uFlowScale)*uFlowStr;
        float fy = curlY(pos.x, pos.y, t, uFlowScale)*uFlowStr;

        // disturbance: repel from each interactor point
        float seed = hash12(uv)*1000.0;
        float radNoise = 0.7 + 0.6*(sin(seed*3.7 + uTime*2.0)*0.5+0.5);
        float rad = uRadBase*radNoise;
        vec2 repel = vec2(0.0);
        for (int p=0; p<${MAX_POINTS}; p++){
          if (p >= uCount) break;
          vec4 it = texture2D(uInteractors, vec2((float(p)+0.5)/${MAX_POINTS}.0, 0.5));
          vec2 d = pos - it.xy;
          float dist = length(d);
          if (dist < rad && dist > 0.1){
            float inf = 1.0 - dist/rad;
            repel += (d/dist)*inf*0.25;
          }
        }

        // shimmer jitter
        float jb = uTime*57.0 + hash12(uv)*123.0;
        float jx = (hash11(jb+0.7)-0.5)*0.15;
        float jy = (hash11(jb+9.1)-0.5)*0.15;

        vel += (vec2(fx,fy) + repel + vec2(jx,jy)) * uDt * 60.0;
        vel *= 0.98; // less damping — drift further
        pos += vel;

        // wrap around edges
        float hw = uW*0.5+50.0, hh = uH*0.5+50.0;
        if (pos.x < -hw) pos.x += uW+100.0;
        if (pos.x >  hw) pos.x -= uW+100.0;
        if (pos.y < -hh) pos.y += uH+100.0;
        if (pos.y >  hh) pos.y -= uH+100.0;

        gl_FragColor = vec4(pos, vel);
      }
    `;

    // ── Age / excitation / hue step ──
    const dataFrag = `
      uniform float uTime, uDt, uRadBase;
      uniform sampler2D uInteractors;
      uniform int uCount;
      ${GLSL_HASH}
      void main(){
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec4 P = texture2D(texPos, uv);
        vec4 D = texture2D(texData, uv);
        float age=D.x; float maxAge=D.y; float exc=D.z; float hue=D.w;
        float sb = uTime*13.31 + hash12(uv)*101.7;

        // respawn — new lifespan + fresh color
        if (age + uDt >= maxAge){
          float newMax = 6.0 + hash11(sb+5.5)*14.0;
          float roll = hash11(sb+6.6);
          float hb = hash11(sb+7.7);
          float nh;
          if (roll<0.25) nh=0.47+hb*0.03;
          else if (roll<0.70) nh=0.50+hb*0.03;
          else if (roll<0.80) nh=0.58+hb*0.04;
          else if (roll<0.90) nh=0.72+hb*0.06;
          else nh=0.38+hb*0.04;
          gl_FragColor = vec4(0.0, newMax, 0.0, nh);
          return;
        }

        // excite when disturbed by an interactor, else decay
        vec2 pos = P.xy;
        float seed = hash12(uv)*1000.0;
        float radNoise = 0.7 + 0.6*(sin(seed*3.7 + uTime*2.0)*0.5+0.5);
        float rad = uRadBase*radNoise;
        bool disturbed = false;
        for (int p=0; p<${MAX_POINTS}; p++){
          if (p >= uCount) break;
          vec4 it = texture2D(uInteractors, vec2((float(p)+0.5)/${MAX_POINTS}.0, 0.5));
          vec2 d = pos - it.xy;
          float dist = length(d);
          if (dist < rad && dist > 0.1){
            float inf = 1.0 - dist/rad;
            exc = min(1.0, exc + inf*0.06);
            disturbed = true;
          }
        }
        if (!disturbed) exc *= 0.95;

        age += uDt;
        gl_FragColor = vec4(age, maxAge, exc, hue);
      }
    `;

    const posVar = gpu.addVariable('texPos', posFrag, pos0);
    const dataVar = gpu.addVariable('texData', dataFrag, data0);
    gpu.setVariableDependencies(posVar, [posVar, dataVar]);
    gpu.setVariableDependencies(dataVar, [posVar, dataVar]);

    // uniforms shared by both compute passes
    Object.assign(posVar.material.uniforms, {
      uTime: { value: 0 }, uDt: { value: 0.016 },
      uW: { value: W }, uH: { value: H },
      uFlowStr: { value: FLOW_STR }, uFlowScale: { value: FLOW_SCALE },
      uRadBase: { value: 60 },
      uInteractors: { value: interactorTex }, uCount: { value: 0 }
    });
    Object.assign(dataVar.material.uniforms, {
      uTime: { value: 0 }, uDt: { value: 0.016 },
      uRadBase: { value: 60 },
      uInteractors: { value: interactorTex }, uCount: { value: 0 }
    });

    const gpuErr = gpu.init();
    if (gpuErr !== null) console.error('GPUComputationRenderer error:', gpuErr);

    // ── Render material: reads particle state straight from the sim textures ──
    const refs = new Float32Array(PARTICLE_COUNT * 2);
    for (let j = 0, k = 0; j < TEX_SIZE; j++) {
      for (let i = 0; i < TEX_SIZE; i++, k++) {
        refs[k*2]   = (i + 0.5) / TEX_SIZE;
        refs[k*2+1] = (j + 0.5) / TEX_SIZE;
      }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(PARTICLE_COUNT * 3), 3));
    geo.setAttribute('reference', new THREE.BufferAttribute(refs, 2));

    const pMat = new THREE.ShaderMaterial({
      uniforms: {
        texPos: { value: null },
        texData: { value: null },
        uTime: { value: 0 }
      },
      vertexShader: `
        uniform sampler2D texPos;
        uniform sampler2D texData;
        uniform float uTime;
        attribute vec2 reference;
        varying float vAlpha;
        varying float vHue;
        float hash12(vec2 p){ vec3 p3=fract(vec3(p.xyx)*0.1031); p3+=dot(p3,p3.yzx+33.33); return fract((p3.x+p3.y)*p3.z); }
        void main() {
          vec4 P = texture2D(texPos, reference);
          vec4 D = texture2D(texData, reference);
          float age=D.x; float maxAge=D.y; float exc=D.z; float hue=D.w;
          float ageNorm = age/maxAge;
          float fadeIn = min(1.0, ageNorm/0.1);
          float fadeOut = min(1.0, (1.0-ageNorm)/0.2);
          float ageFade = fadeIn*fadeOut;
          // breathing ambient: each particle gently pulses at its own rate
          float seed = hash12(reference)*1000.0;
          float breath = 0.08 + 0.03*sin(uTime*(0.3 + seed*0.0004) + seed);
          float life = ageFade * (breath + exc*0.8);
          vAlpha = life * 1.3;
          vHue = hue;
          gl_PointSize = 3.0 + life * 2.5; // brighter = bigger glow
          gl_Position = projectionMatrix * modelViewMatrix * vec4(P.xy, 0.0, 1.);
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        varying float vHue;
        vec3 hue2rgb(float h) {
          h = fract(h);
          float r = abs(h*6.-3.)-1.;
          float g = 2.-abs(h*6.-2.);
          float b = 2.-abs(h*6.-4.);
          return clamp(vec3(r,g,b),0.,1.);
        }
        void main() {
          float d = length(gl_PointCoord - .5) * 2.;
          if (d > 1.) discard;
          float a = (1.-d*d) * vAlpha;
          float h = vHue;
          vec3 c = hue2rgb(h);
          // when excited, push toward bright white-cyan
          c = mix(c, vec3(.6, .95, .9), vAlpha * 0.4);
          gl_FragColor = vec4(c, a);
        }
      `,
      transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particlePoints = new THREE.Points(geo, pMat);
    particlePoints.frustumCulled = false; // positions live in the texture, not the attribute
    scene.add(particlePoints);

    // ══════════════════════════════════════════════
    // INTERACTION POINTS (hands + mouse fallback)
    // ══════════════════════════════════════════════
    // Each point: {x, y} in scene coords (centered, y-up)
    let interactors = [];
    let hasHands = false;

    // ── Mouse fallback ──
    let mouseX = 0, mouseY = 0, mouseIn = false;
    window.addEventListener('mousemove', e => {
      mouseX = e.clientX - W/2; mouseY = -(e.clientY - H/2); mouseIn = true;
    });
    window.addEventListener('mouseleave', () => { mouseIn = false; });
    window.addEventListener('touchmove', e => {
      mouseX = e.touches[0].clientX - W/2; mouseY = -(e.touches[0].clientY - H/2); mouseIn = true;
    }, { passive: true });
    window.addEventListener('touchend', () => { mouseIn = false; });

    // ── Hand tracking ──
    let handLandmarker = null;
    let videoReady = false;
    let lastDetect = 0;
    const videoEl = document.getElementById('video');

    const PALM_VERTS = [0, 1, 5, 9, 13, 17];

    // ── Solid glowing hand (clean SDF silhouette, NOT metaballs) ──
    // Fingers = tapered rounded capsule-chains (smooth, no lumps); palm = a
    // filled, inflated polygon through wrist + knuckles. Hard union (min) keeps
    // edges crisp. Result: a real hand outline, filled and glowing.
    const FINGERS = [
      { idx: [1, 2, 3, 4],     base: 0.17  }, // thumb (fatter)
      { idx: [5, 6, 7, 8],     base: 0.14  }, // index
      { idx: [9, 10, 11, 12],  base: 0.145 }, // middle
      { idx: [13, 14, 15, 16], base: 0.135 }, // ring
      { idx: [17, 18, 19, 20], base: 0.115 }  // pinky
    ];
    const TAPER = [1.0, 0.9, 0.8, 0.7];   // radius multiplier base→tip (smooth taper)
    const PALM = [0, 1, 5, 9, 13, 17];    // boundary: wrist→thumb base→knuckles→pinky
    const PALM_ROUND = 0.17;              // palm inflation (fraction of hand span)

    // ---- generate GLSL with literal indices (GLSL ES 1.00 safe) ----
    let fingerGLSL = '';
    for (const f of FINGERS) {
      for (let s = 0; s < 3; s++) {
        const a = f.idx[s], b = f.idx[s+1];
        const ra = (f.base * TAPER[s]).toFixed(4);
        const rb = (f.base * TAPER[s+1]).toFixed(4);
        fingerGLSL += `d = min(d, sdRoundCone(p, uPts[${a}], uPts[${b}], ${ra}*uScale, ${rb}*uScale));\n          `;
      }
    }
    // palm: Inigo-Quilez polygon distance, unrolled over the PALM boundary
    let palmGLSL = `float dp = dot(p-uPts[${PALM[0]}], p-uPts[${PALM[0]}]); float sp = 1.0;\n          `;
    for (let i = 0, j = PALM.length - 1; i < PALM.length; j = i, i++) {
      const vi = PALM[i], vj = PALM[j];
      palmGLSL +=
        `{ vec2 e=uPts[${vj}]-uPts[${vi}]; vec2 w=p-uPts[${vi}];` +
        ` vec2 b=w-e*clamp(dot(w,e)/dot(e,e),0.0,1.0); dp=min(dp,dot(b,b));` +
        ` bvec3 c=bvec3(p.y>=uPts[${vi}].y, p.y<uPts[${vj}].y, e.x*w.y>e.y*w.x);` +
        ` if(all(c)||all(not(c))) sp=-sp; }\n          `;
    }
    palmGLSL += `d = min(d, sp*sqrt(dp) - ${PALM_ROUND.toFixed(4)}*uScale);`;

    const handFrag = `
      precision highp float;
      uniform vec2 uPts[21];
      uniform float uScale;   // hand span (px)
      uniform float uAA;      // edge softness (px)
      uniform vec3 uColor;
      varying vec2 vWorld;

      // distance to a capsule with different end radii (rounded cone)
      float sdRoundCone(vec2 p, vec2 a, vec2 b, float ra, float rb){
        vec2 ba = b - a;
        float l2 = max(dot(ba, ba), 1e-4);
        float t = clamp(dot(p - a, ba)/l2, 0.0, 1.0);
        return length(p - (a + t*ba)) - mix(ra, rb, t);
      }

      void main(){
        vec2 p = vWorld;
        float d = 1e5;
        ${fingerGLSL}
        ${palmGLSL}

        float inside = smoothstep(uAA, -uAA, d);             // crisp solid fill
        float rim    = smoothstep(0.05*uScale, 0.0, abs(d)); // bright edge band
        float outer  = exp(max(d, 0.0) / -(0.05*uScale));    // soft halo
        vec3 col = uColor * (0.5 + rim*1.0);
        float alpha = inside*0.72 + outer*0.16;
        if (alpha < 0.003) discard;
        gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
      }
    `;
    const handVert = `
      varying vec2 vWorld;
      void main(){
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorld = wp.xy;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `;

    function makeHandMat() {
      const pts = []; for (let i = 0; i < 21; i++) pts.push(new THREE.Vector2());
      return new THREE.ShaderMaterial({
        uniforms: {
          uPts:   { value: pts },
          uScale: { value: 100 },
          uAA:    { value: 2 },
          uColor: { value: new THREE.Color(0.30, 0.78, 0.88) }
        },
        vertexShader: handVert,
        fragmentShader: handFrag,
        transparent: true, depthWrite: false, depthTest: false,
        blending: THREE.NormalBlending
      });
    }

    // a bounding quad per hand; the SDF only runs over the hand's box
    const handQuadGeo = new THREE.PlaneGeometry(1, 1);
    const handScene = new THREE.Scene();
    const handMeshes = [];
    for (let h = 0; h < 2; h++) {
      const m = new THREE.Mesh(handQuadGeo, makeHandMat());
      m.frustumCulled = false;
      m.visible = false;
      handScene.add(m);
      handMeshes.push(m);
    }

    const _p2 = []; for (let i = 0; i < 21; i++) _p2.push({ x: 0, y: 0 });

    function updateHandMesh(handIdx, hand) {
      const mesh = handMeshes[handIdx];
      const u = mesh.material.uniforms;
      const pts = u.uPts.value;
      let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
      for (let j = 0; j < 21; j++) {
        const x = (1 - hand[j].x) * W - W/2;
        const y = -(hand[j].y * H - H/2);
        _p2[j].x = x; _p2[j].y = y;
        pts[j].set(x, y);
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
      // hand span = wrist (0) → middle knuckle (9)
      const dx = _p2[9].x - _p2[0].x, dy = _p2[9].y - _p2[0].y;
      const span = Math.max(40, Math.sqrt(dx*dx + dy*dy));
      u.uScale.value = span;
      u.uAA.value = Math.max(1.5, 0.02 * span);

      const margin = 0.5 * span; // room for palm rounding + tip radius + halo
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      const sx = (maxX - minX) + margin*2, sy = (maxY - minY) + margin*2;
      mesh.position.set(cx, cy, 0);
      mesh.scale.set(sx, sy, 1);
      mesh.visible = true;
    }

    function hideHandMesh(handIdx) { handMeshes[handIdx].visible = false; }

    function lm2scene(lm) {
      return { x: (1 - lm.x) * W - W/2, y: -(lm.y * H - H/2) };
    }

    async function startHands() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' }
        });
        videoEl.srcObject = stream;
        await videoEl.play();
        videoReady = true;
        document.getElementById('hint').textContent = 'move your hand to see magic';
      } catch (e) {
        document.getElementById('hint').textContent = 'move your mouse to see magic';
        return;
      }

      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO", numHands: 2,
          minHandDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
      } catch (e) { return; }
    }
    startHands();

    function detectHands() {
      if (!handLandmarker || !videoReady) return;
      const now = performance.now();
      if (now - lastDetect < 80) return;
      lastDetect = now;

      let results;
      try { results = handLandmarker.detectForVideo(videoEl, now); } catch(e) { return; }

      const nHands = (results.landmarks && results.landmarks.length) || 0;

      if (nHands > 0) {
        hasHands = true;
        interactors = [];

        for (let h = 0; h < nHands && h < 2; h++) {
          const hand = results.landmarks[h];

          // ── All 21 landmarks as repel points ──
          for (let j = 0; j < 21; j++) {
            interactors.push(lm2scene(hand[j]));
          }
          // ── Interpolated palm fill points ──
          for (let a = 0; a < PALM_VERTS.length; a++) {
            for (let b = a + 1; b < PALM_VERTS.length; b++) {
              const la = hand[PALM_VERTS[a]], lb = hand[PALM_VERTS[b]];
              interactors.push(lm2scene({ x: (la.x+lb.x)/2, y: (la.y+lb.y)/2 }));
            }
          }
          // palm center
          let cx = 0, cy = 0;
          for (const v of PALM_VERTS) { cx += hand[v].x; cy += hand[v].y; }
          cx /= PALM_VERTS.length; cy /= PALM_VERTS.length;
          interactors.push(lm2scene({ x: cx, y: cy }));

          // ── Update solid glowing hand ──
          updateHandMesh(h, hand);
        }
      } else {
        hasHands = false;
      }
      // hide any hand slots not detected this frame
      for (let h = nHands; h < 2; h++) hideHandMesh(h);
    }

    // Upload the active interactor points into the GPU data texture.
    function updateInteractorTexture(points) {
      const n = Math.min(points.length, MAX_POINTS);
      for (let p = 0; p < n; p++) {
        interactorData[p*4]   = points[p].x;
        interactorData[p*4+1] = points[p].y;
        interactorData[p*4+2] = 1;
        interactorData[p*4+3] = 0;
      }
      interactorTex.needsUpdate = true;
      return n;
    }

    // ══════════════════════════════════════════════
    // ANIMATE
    // ══════════════════════════════════════════════
    let time = 0;
    const totalCycle = PHASE_DURATION * 3;
    const phaseEl = document.getElementById('phase-label');
    const NAMES = ['reveal', 'disturb', 'draw'];
    let hintVisible = true;
    let idleTime = 0;
    const hintEl = document.getElementById('hint');

    function animate() {
      requestAnimationFrame(animate);
      const dt = 0.016;
      time += dt;

      detectHands();

      const phase = Math.min((time % totalCycle) / PHASE_DURATION, 2.999);
      phaseEl.textContent = NAMES[Math.floor(phase)];

      const disturb = 1 - Math.abs(phase - 1);
      const mouseRadBase = 60 + disturb * 40;
      // breathing: trail persistence oscillates → whole field gently pulses
      fadeMat.uniforms.fade.value = 0.91 + 0.015 * Math.sin(time * 0.3);

      // ── Feed interactor points + sim params to the GPU ──
      const points = hasHands ? interactors : (mouseIn ? [{x: mouseX, y: mouseY}] : []);
      const count = updateInteractorTexture(points);

      const pu = posVar.material.uniforms, du = dataVar.material.uniforms;
      pu.uTime.value = time; pu.uDt.value = dt; pu.uRadBase.value = mouseRadBase; pu.uCount.value = count;
      du.uTime.value = time; du.uDt.value = dt; du.uRadBase.value = mouseRadBase; du.uCount.value = count;

      // ── Step the simulation on the GPU ──
      gpu.compute();
      pMat.uniforms.texPos.value = gpu.getCurrentRenderTarget(posVar).texture;
      pMat.uniforms.texData.value = gpu.getCurrentRenderTarget(dataVar).texture;
      pMat.uniforms.uTime.value = time;

      // hint text: hide on activity, show after idle
      if (hasHands || mouseIn) {
        idleTime = 0;
        if (hintVisible) { hintEl.style.opacity = '0'; hintVisible = false; }
      } else {
        idleTime += dt;
        if (idleTime > 8 && !hintVisible) { hintEl.style.opacity = '1'; hintVisible = true; }
      }

      // ── Render with trails ──
      // 1. trail buffer: fade previous frame, draw fresh particles on top
      fadeMat.uniforms.tPrev.value = readRT.texture;
      renderer.setRenderTarget(writeRT);
      renderer.clear();
      renderer.render(trailScene, trailCam);  // faded previous frame
      renderer.autoClear = false;
      renderer.render(scene, camera);          // live particles added (additive)
      renderer.autoClear = true;
      renderer.setRenderTarget(null);

      // 2. composite trail buffer to screen
      //    trail buffer = accumulated fading trails + bright live particles
      compMat.uniforms.tTrail.value = writeRT.texture;
      renderer.render(compScene, trailCam);

      // 3. solid glowing hand on top — crisp, no trail smear
      renderer.autoClear = false;
      renderer.render(handScene, camera);
      renderer.autoClear = true;

      [readRT, writeRT] = [writeRT, readRT];
    }

    // ══════════════════════════════════════════════
    // RESIZE
    // ══════════════════════════════════════════════
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera.left = -w/2; camera.right = w/2;
      camera.top = h/2; camera.bottom = -h/2;
      camera.updateProjectionMatrix();
      trailCam.left = -w/2; trailCam.right = w/2;
      trailCam.top = h/2; trailCam.bottom = -h/2;
      trailCam.updateProjectionMatrix();
    });

    animate();
  </script>
</body>
</html>
