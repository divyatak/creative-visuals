<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bioluminescent Flow</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    #back {
      position: fixed; top: 20px; left: 20px;
      color: rgba(255,255,255,0.35); font: 14px monospace;
      text-decoration: none; z-index: 10; cursor: pointer;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.8); }
    #phase-label {
      position: fixed; bottom: 24px; right: 24px;
      font: 11px monospace; letter-spacing: 1px;
      color: rgba(255,255,255,0.12);
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <a id="back" href="../">&larr; back</a>
  <div id="phase-label"></div>
  <video id="video" playsinline style="display:none;"></video>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { HandLandmarker, FilesetResolver } from
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

    // ══════════════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════════════
    const PARTICLE_COUNT = 40000;
    const PHASE_DURATION = 20;
    const W = window.innerWidth, H = window.innerHeight;

    // ══════════════════════════════════════════════
    // RENDERER + CAMERA
    // ══════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    camera.position.z = 10;

    // ── Trail framebuffers (feedback for persistence) ──
    const mkRT = () => new THREE.WebGLRenderTarget(
      W * Math.min(window.devicePixelRatio, 2),
      H * Math.min(window.devicePixelRatio, 2),
      { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat }
    );
    let rtA = mkRT(), rtB = mkRT();
    let readRT = rtA, writeRT = rtB;

    const fullGeo = new THREE.PlaneGeometry(W, H);

    // fade previous frame
    const fadeMat = new THREE.ShaderMaterial({
      uniforms: { tPrev: { value: null }, fade: { value: 0.94 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tPrev; uniform float fade; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tPrev,vUv)*fade; }`,
      transparent: true, depthWrite: false
    });
    const fadeQuad = new THREE.Mesh(fullGeo, fadeMat);

    const trailScene = new THREE.Scene();
    const trailCam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    trailCam.position.z = 10;
    trailScene.add(fadeQuad);

    // composite trail to screen at full brightness (feedback fade handles decay)
    const compMat = new THREE.ShaderMaterial({
      uniforms: { tTrail: { value: null } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tTrail; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tTrail,vUv); }`,
      transparent: true, depthWrite: false
    });
    const compQuad = new THREE.Mesh(fullGeo.clone(), compMat);
    const compScene = new THREE.Scene();
    compScene.add(compQuad);

    // ══════════════════════════════════════════════
    // PARTICLES
    // ══════════════════════════════════════════════
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 2);
    const seeds = new Float32Array(PARTICLE_COUNT);
    const lifetimes = new Float32Array(PARTICLE_COUNT);
    const ages = new Float32Array(PARTICLE_COUNT);       // 0→1 over lifespan
    const maxAges = new Float32Array(PARTICLE_COUNT);    // how long this particle lives
    const hueOffsets = new Float32Array(PARTICLE_COUNT); // per-particle color

    function respawn(i) {
      positions[i*3]     = (Math.random() - 0.5) * W;
      positions[i*3 + 1] = (Math.random() - 0.5) * H;
      positions[i*3 + 2] = 0;
      velocities[i*2]     = (Math.random() - 0.5) * 1.5;
      velocities[i*2 + 1] = (Math.random() - 0.5) * 1.5;
      seeds[i] = Math.random() * 1000;
      ages[i] = 0;
      maxAges[i] = 4 + Math.random() * 10; // 4-14 seconds lifespan
      hueOffsets[i] = (Math.random() - 0.5) * 0.22; // ±0.22 → cyan(0.36) through blue, purple, to pink(0.80)
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      respawn(i);
      ages[i] = Math.random() * maxAges[i]; // stagger initial ages
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));
    geo.setAttribute('aLife', new THREE.BufferAttribute(lifetimes, 1));
    geo.setAttribute('aHueOff', new THREE.BufferAttribute(hueOffsets, 1));

    const pMat = new THREE.ShaderMaterial({
      uniforms: {
        uPhase: { value: 0 },
        uMouseActive: { value: 0 }
      },
      vertexShader: `
        attribute float aSeed;
        attribute float aLife;
        attribute float aHueOff;
        uniform float uPhase;
        uniform float uMouseActive;
        varying float vAlpha;
        varying float vHue;
        void main() {
          float reveal  = max(0., 1. - uPhase);
          float disturb = 1. - abs(uPhase - 1.);
          float draw    = max(0., uPhase - 1.5) * 2.;
          float baseBright = 0.3 + disturb * 0.25 + draw * 0.15;
          float ageFade = aLife;
          vAlpha = baseBright * (0.3 + 0.7 * ageFade);
          vAlpha *= mix(1., 0.25, reveal * (1. - uMouseActive));
          // per-particle hue — only the small random offset, no seed drift
          vHue = aHueOff;
          float sz = mix(4.0, 6.5, disturb + draw * 0.5) * (0.4 + ageFade * 0.9);
          sz *= mix(0.7, 1., min(1., uMouseActive + (1. - reveal)));
          gl_PointSize = sz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.);
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        varying float vHue;
        vec3 hue2rgb(float h) {
          h = fract(h);
          float r = abs(h*6.-3.)-1.;
          float g = 2.-abs(h*6.-2.);
          float b = 2.-abs(h*6.-4.);
          return clamp(vec3(r,g,b),0.,1.);
        }
        void main() {
          float d = length(gl_PointCoord - .5) * 2.;
          if (d > 1.) discard;
          float a = (1.-d*d) * vAlpha;
          // cyan-blue center (~0.58): cyans at low end, purples/pinks at high
          float h = .58 + vHue;
          vec3 c = hue2rgb(h);
          c += vec3(.03,.04,.06) * (1.-d);
          gl_FragColor = vec4(c, a);
        }
      `,
      transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    scene.add(new THREE.Points(geo, pMat));

    // ══════════════════════════════════════════════
    // FLOW FIELD (curl noise via sin layers)
    // ══════════════════════════════════════════════
    // multi-octave flow for organic, alive movement
    function flowAngle(x, y, t, s) {
      // octave 1: large-scale currents
      let v = Math.sin(x*s*1.1 + t*.3) + Math.sin(y*s*.9 + t*.2);
      v += Math.sin(x*s*.7 - t*.25) + Math.cos(y*s*1.3 + t*.35);
      v += Math.sin((x+y)*s*.5 + t*.15);
      // octave 2: medium turbulence
      const s2 = s * 2.5;
      v += (Math.sin(x*s2 + t*.6) + Math.cos(y*s2*1.2 - t*.5)) * 0.5;
      v += Math.sin((x-y)*s2*.8 + t*.45) * 0.4;
      // octave 3: fine detail / shimmer
      const s3 = s * 6;
      v += (Math.sin(x*s3 + t*1.2) + Math.sin(y*s3 + t*.9)) * 0.2;
      return v * 0.65;
    }
    function curlX(x,y,t,s){ const e=1.5; return (flowAngle(x,y+e,t,s)-flowAngle(x,y-e,t,s))/(e*2); }
    function curlY(x,y,t,s){ const e=1.5; return -(flowAngle(x+e,y,t,s)-flowAngle(x-e,y,t,s))/(e*2); }

    // ══════════════════════════════════════════════
    // INTERACTION POINTS (hands + mouse fallback)
    // ══════════════════════════════════════════════
    // Each point: {x, y} in scene coords (centered, y-up)
    let interactors = [];
    let hasHands = false;

    // ── Mouse fallback ──
    let mouseX = 0, mouseY = 0, mouseIn = false;
    window.addEventListener('mousemove', e => {
      mouseX = e.clientX - W/2; mouseY = -(e.clientY - H/2); mouseIn = true;
    });
    window.addEventListener('mouseleave', () => { mouseIn = false; });
    window.addEventListener('touchmove', e => {
      mouseX = e.touches[0].clientX - W/2; mouseY = -(e.touches[0].clientY - H/2); mouseIn = true;
    }, { passive: true });
    window.addEventListener('touchend', () => { mouseIn = false; });

    // ── Hand tracking ──
    let handLandmarker = null;
    let videoReady = false;
    let lastDetect = 0;
    const videoEl = document.getElementById('video');
    const FINGERTIPS = [4, 8, 12, 16, 20]; // thumb, index, middle, ring, pinky

    async function startHands() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' }
        });
        videoEl.srcObject = stream;
        await videoEl.play();
        videoReady = true;
      } catch (e) { return; } // no camera — mouse only

      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO", numHands: 2,
          minHandDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
      } catch (e) { return; }
    }
    startHands();

    function detectHands() {
      if (!handLandmarker || !videoReady) return;
      const now = performance.now();
      if (now - lastDetect < 80) return; // ~12fps detection
      lastDetect = now;

      let results;
      try { results = handLandmarker.detectForVideo(videoEl, now); } catch(e) { return; }

      if (results.landmarks && results.landmarks.length > 0) {
        hasHands = true;
        interactors = [];
        for (const hand of results.landmarks) {
          for (const tip of FINGERTIPS) {
            // landmarks are 0-1, mirrored. Map to scene coords.
            interactors.push({
              x: (1 - hand[tip].x) * W - W/2,  // mirror + center
              y: -(hand[tip].y * H - H/2)       // flip y + center
            });
          }
        }
      } else {
        hasHands = false;
      }
    }

    // ══════════════════════════════════════════════
    // ANIMATE
    // ══════════════════════════════════════════════
    let time = 0;
    const totalCycle = PHASE_DURATION * 3;
    const phaseEl = document.getElementById('phase-label');
    const NAMES = ['reveal', 'disturb', 'draw'];
    let smoothMouseActive = 0;

    function animate() {
      requestAnimationFrame(animate);
      const dt = 0.016;
      time += dt;

      detectHands();

      const phase = Math.min((time % totalCycle) / PHASE_DURATION, 2.999);
      phaseEl.textContent = NAMES[Math.floor(phase)];

      const reveal  = Math.max(0, 1 - phase);
      const disturb = 1 - Math.abs(phase - 1);
      const draw    = Math.max(0, phase - 1.5) * 2;

      const mouseRadBase = 35 + disturb * 40 + draw * 30;
      const flowStr    = 1.2 + disturb * 1.8 + draw * 0.8;
      const flowScale  = 0.0018 + disturb * 0.0008;
      fadeMat.uniforms.fade.value = 0.94 + draw * 0.02 + reveal * 0.01;

      const posArr = geo.attributes.position.array;
      const lifeArr = geo.attributes.aLife.array;
      const hueArr = geo.attributes.aHueOff.array;
      let mouseActiveSum = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i*3, iy = i*3+1, ivx = i*2, ivy = i*2+1;

        // ── Age + lifecycle ──
        ages[i] += dt;
        const ageNorm = ages[i] / maxAges[i]; // 0→1
        if (ageNorm >= 1) {
          respawn(i);
          hueArr[i] = hueOffsets[i]; // sync buffer
          continue;
        }
        // fade in first 10%, fade out last 20%
        const fadeIn = Math.min(1, ageNorm / 0.1);
        const fadeOut = Math.min(1, (1 - ageNorm) / 0.2);
        lifeArr[i] = fadeIn * fadeOut;

        let px = posArr[ix], py = posArr[iy];

        // ── Flow field ──
        const fx = curlX(px, py, time, flowScale) * flowStr;
        const fy = curlY(px, py, time, flowScale) * flowStr;

        // ── Repel from all interaction points (hands or mouse) ──
        let mx = 0, my = 0;
        // build active points: hands if available, else mouse
        const points = hasHands ? interactors : (mouseIn ? [{x: mouseX, y: mouseY}] : []);
        const radNoise = 0.7 + 0.6 * (Math.sin(seeds[i] * 3.7 + time * 2) * 0.5 + 0.5);
        const rad = mouseRadBase * radNoise;
        for (let p = 0; p < points.length; p++) {
          const dx = px - points[p].x, dy = py - points[p].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < rad && dist > 0.1) {
            const inf = 1 - dist/rad;
            const infSq = inf * inf;
            mouseActiveSum += infSq;
            mx += dx/dist * infSq * 2.5;
            my += dy/dist * infSq * 2.5;
          }
        }

        velocities[ivx] += (fx + mx) * dt * 60;
        velocities[ivy] += (fy + my) * dt * 60;
        velocities[ivx] *= 0.96;
        velocities[ivy] *= 0.96;

        posArr[ix] += velocities[ivx];
        posArr[iy] += velocities[ivy];

        // wrap
        const hw = W/2+50, hh = H/2+50;
        if (posArr[ix] < -hw) posArr[ix] += W+100;
        if (posArr[ix] >  hw) posArr[ix] -= W+100;
        if (posArr[iy] < -hh) posArr[iy] += H+100;
        if (posArr[iy] >  hh) posArr[iy] -= H+100;
      }

      geo.attributes.position.needsUpdate = true;
      geo.attributes.aLife.needsUpdate = true;
      geo.attributes.aHueOff.needsUpdate = true;

      const mouseActive = Math.min(1, mouseActiveSum / 200);
      smoothMouseActive += ((mouseIn ? Math.max(mouseActive, 0.3) : 0) - smoothMouseActive) * 0.05;

      pMat.uniforms.uPhase.value = phase;
      pMat.uniforms.uMouseActive.value = smoothMouseActive;

      // ── Render with trails ──
      // 1. trail buffer: fade previous frame, draw fresh particles on top
      fadeMat.uniforms.tPrev.value = readRT.texture;
      renderer.setRenderTarget(writeRT);
      renderer.clear();
      renderer.render(trailScene, trailCam);  // faded previous frame
      renderer.autoClear = false;
      renderer.render(scene, camera);          // live particles added (additive)
      renderer.autoClear = true;
      renderer.setRenderTarget(null);

      // 2. composite trail buffer to screen
      //    trail buffer = accumulated fading trails + bright live particles
      compMat.uniforms.tTrail.value = writeRT.texture;
      renderer.render(compScene, trailCam);

      [readRT, writeRT] = [writeRT, readRT];
    }

    // ══════════════════════════════════════════════
    // RESIZE
    // ══════════════════════════════════════════════
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera.left = -w/2; camera.right = w/2;
      camera.top = h/2; camera.bottom = -h/2;
      camera.updateProjectionMatrix();
      trailCam.left = -w/2; trailCam.right = w/2;
      trailCam.top = h/2; trailCam.bottom = -h/2;
      trailCam.updateProjectionMatrix();
    });

    animate();
  </script>
</body>
</html>
