<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bioluminescent Flow</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    #back {
      position: fixed; top: 20px; left: 20px;
      color: rgba(255,255,255,0.35); font: 14px monospace;
      text-decoration: none; z-index: 10; cursor: pointer;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.8); }
    #phase-label {
      position: fixed; bottom: 24px; right: 24px;
      font: 11px monospace; letter-spacing: 1px;
      color: rgba(255,255,255,0.12);
      pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <a id="back" href="../">&larr; back</a>
  <div id="phase-label"></div>
  <div id="hint" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:15px monospace;color:rgba(255,255,255,0.2);letter-spacing:2px;pointer-events:none;z-index:10;transition:opacity 1.5s;">move your hand to see magic</div>
  <video id="video" playsinline style="display:none;"></video>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { HandLandmarker, FilesetResolver } from
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

    // ══════════════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════════════
    const PARTICLE_COUNT = 25000;
    const PHASE_DURATION = 20;
    const W = window.innerWidth, H = window.innerHeight;

    // ══════════════════════════════════════════════
    // RENDERER + CAMERA
    // ══════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    camera.position.z = 10;

    // ── Trail framebuffers (feedback for persistence) ──
    const mkRT = () => new THREE.WebGLRenderTarget(
      W * Math.min(window.devicePixelRatio, 2),
      H * Math.min(window.devicePixelRatio, 2),
      { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat }
    );
    let rtA = mkRT(), rtB = mkRT();
    let readRT = rtA, writeRT = rtB;

    const fullGeo = new THREE.PlaneGeometry(W, H);

    // fade previous frame
    const fadeMat = new THREE.ShaderMaterial({
      uniforms: { tPrev: { value: null }, fade: { value: 0.94 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tPrev; uniform float fade; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tPrev,vUv)*fade; }`,
      transparent: true, depthWrite: false
    });
    const fadeQuad = new THREE.Mesh(fullGeo, fadeMat);

    const trailScene = new THREE.Scene();
    const trailCam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
    trailCam.position.z = 10;
    trailScene.add(fadeQuad);

    // composite trail to screen with global breathing glow
    const compMat = new THREE.ShaderMaterial({
      uniforms: { tTrail: { value: null }, uBreath: { value: 1.0 } },
      vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader: `uniform sampler2D tTrail; uniform float uBreath; varying vec2 vUv;
        void main(){ gl_FragColor=texture2D(tTrail,vUv) * uBreath; }`,
      transparent: true, depthWrite: false
    });
    const compQuad = new THREE.Mesh(fullGeo.clone(), compMat);
    const compScene = new THREE.Scene();
    compScene.add(compQuad);

    // ══════════════════════════════════════════════
    // PARTICLES
    // ══════════════════════════════════════════════
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 2);
    const seeds = new Float32Array(PARTICLE_COUNT);
    const lifetimes = new Float32Array(PARTICLE_COUNT);
    const ages = new Float32Array(PARTICLE_COUNT);
    const maxAges = new Float32Array(PARTICLE_COUNT);
    const hueOffsets = new Float32Array(PARTICLE_COUNT);
    const excitation = new Float32Array(PARTICLE_COUNT); // 0=dark, 1=fully glowing

    function respawn(i) {
      positions[i*3]     = (Math.random() - 0.5) * W;
      positions[i*3 + 1] = (Math.random() - 0.5) * H;
      positions[i*3 + 2] = 0;
      velocities[i*2]     = (Math.random() - 0.5) * 0.3;
      velocities[i*2 + 1] = (Math.random() - 0.5) * 0.3;
      seeds[i] = Math.random() * 1000;
      ages[i] = 0;
      maxAges[i] = 6 + Math.random() * 14; // longer lives — algae persist
      hueOffsets[i] = (Math.random() - 0.5) * 0.12; // tighter cyan-blue range
      excitation[i] = 0;
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      respawn(i);
      ages[i] = Math.random() * maxAges[i];
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));
    geo.setAttribute('aLife', new THREE.BufferAttribute(lifetimes, 1));
    geo.setAttribute('aHueOff', new THREE.BufferAttribute(hueOffsets, 1));

    const pMat = new THREE.ShaderMaterial({
      uniforms: {
        uPhase: { value: 0 },
        uMouseActive: { value: 0 }
      },
      vertexShader: `
        attribute float aSeed;
        attribute float aLife; // encodes: ageFade * (ambient + excitation)
        attribute float aHueOff;
        varying float vAlpha;
        varying float vHue;
        void main() {
          vAlpha = aLife;
          vHue = aHueOff;
          float sz = 2.5 + aLife * 2.0; // brighter = slightly bigger
          gl_PointSize = sz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.);
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        varying float vHue;
        vec3 hue2rgb(float h) {
          h = fract(h);
          float r = abs(h*6.-3.)-1.;
          float g = 2.-abs(h*6.-2.);
          float b = 2.-abs(h*6.-4.);
          return clamp(vec3(r,g,b),0.,1.);
        }
        void main() {
          float d = length(gl_PointCoord - .5) * 2.;
          if (d > 1.) discard;
          float a = (1.-d*d) * vAlpha;
          // bioluminescent blue-cyan
          float h = .54 + vHue;
          vec3 c = hue2rgb(h);
          // when excited, push toward bright white-cyan
          c = mix(c, vec3(.6, .95, .9), vAlpha * 0.4);
          gl_FragColor = vec4(c, a);
        }
      `,
      transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    scene.add(new THREE.Points(geo, pMat));

    // ══════════════════════════════════════════════
    // FLOW FIELD (curl noise via sin layers)
    // ══════════════════════════════════════════════
    // multi-octave flow for organic, alive movement
    function flowAngle(x, y, t, s) {
      // octave 1: large-scale currents
      let v = Math.sin(x*s*1.1 + t*.3) + Math.sin(y*s*.9 + t*.2);
      v += Math.sin(x*s*.7 - t*.25) + Math.cos(y*s*1.3 + t*.35);
      v += Math.sin((x+y)*s*.5 + t*.15);
      // octave 2: medium turbulence
      const s2 = s * 2.5;
      v += (Math.sin(x*s2 + t*.6) + Math.cos(y*s2*1.2 - t*.5)) * 0.5;
      v += Math.sin((x-y)*s2*.8 + t*.45) * 0.4;
      // octave 3: fine detail / shimmer
      const s3 = s * 6;
      v += (Math.sin(x*s3 + t*1.2) + Math.sin(y*s3 + t*.9)) * 0.2;
      return v * 0.65;
    }
    function curlX(x,y,t,s){ const e=1.5; return (flowAngle(x,y+e,t,s)-flowAngle(x,y-e,t,s))/(e*2); }
    function curlY(x,y,t,s){ const e=1.5; return -(flowAngle(x+e,y,t,s)-flowAngle(x-e,y,t,s))/(e*2); }

    // ══════════════════════════════════════════════
    // INTERACTION POINTS (hands + mouse fallback)
    // ══════════════════════════════════════════════
    // Each point: {x, y} in scene coords (centered, y-up)
    let interactors = [];
    let hasHands = false;

    // ── Mouse fallback ──
    let mouseX = 0, mouseY = 0, mouseIn = false;
    window.addEventListener('mousemove', e => {
      mouseX = e.clientX - W/2; mouseY = -(e.clientY - H/2); mouseIn = true;
    });
    window.addEventListener('mouseleave', () => { mouseIn = false; });
    window.addEventListener('touchmove', e => {
      mouseX = e.touches[0].clientX - W/2; mouseY = -(e.touches[0].clientY - H/2); mouseIn = true;
    }, { passive: true });
    window.addEventListener('touchend', () => { mouseIn = false; });

    // ── Hand tracking ──
    let handLandmarker = null;
    let videoReady = false;
    let lastDetect = 0;
    const videoEl = document.getElementById('video');

    const PALM_VERTS = [0, 1, 5, 9, 13, 17];

    // ── Hand wireframe (Three.js LineSegments in main scene) ──
    // Line segments: [from, to] pairs
    const HAND_LINES = [
      // fingers (no 0→1 or 0→5, those go through palm)
      [1,2],[2,3],[3,4],               // thumb
      [5,6],[6,7],[7,8],               // index
      [9,10],[10,11],[11,12],          // middle
      [13,14],[14,15],[15,16],         // ring
      [17,18],[18,19],[19,20],         // pinky
      // palm outline
      [0,1],                           // wrist → thumb base
      [5,9],[9,13],[13,17],            // finger base connections
      [0,17],                          // wrist → pinky base
      // thumb-index bridge: interpolated curve via extra points
      // (we'll add interpolated segments in buildHandLines)
    ];

    const handLineMat = new THREE.ShaderMaterial({
      vertexShader: `void main() { gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
      fragmentShader: `void main() { gl_FragColor = vec4(0.4, 0.75, 0.9, 0.2); }`,
      transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide
    });

    // each segment = 2 triangles (quad), max ~30 segments
    const MAX_HAND_TRIS = 80;
    const handLineGeos = [];
    const handLineMeshes = [];
    for (let h = 0; h < 2; h++) {
      const g = new THREE.BufferGeometry();
      const pos = new Float32Array(MAX_HAND_TRIS * 3 * 3);
      g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      g.setDrawRange(0, 0);
      const mesh = new THREE.Mesh(g, handLineMat);
      mesh.visible = false;
      mesh.frustumCulled = false;
      scene.add(mesh);
      handLineGeos.push(g);
      handLineMeshes.push(mesh);
    }

    const LINE_W = 3; // line thickness in pixels

    function buildHandLines(handIdx, landmarks) {
      const pts = landmarks.map(lm => lm2scene(lm));
      const posArr = handLineGeos[handIdx].attributes.position.array;
      let vi = 0;

      function addQuad(ax,ay, bx,by, w) {
        const dx = bx-ax, dy = by-ay;
        const len = Math.sqrt(dx*dx+dy*dy);
        if (len < 0.1) return;
        const nx = -dy/len * w, ny = dx/len * w;
        // two triangles
        posArr[vi++]=ax+nx; posArr[vi++]=ay+ny; posArr[vi++]=1;
        posArr[vi++]=ax-nx; posArr[vi++]=ay-ny; posArr[vi++]=1;
        posArr[vi++]=bx+nx; posArr[vi++]=by+ny; posArr[vi++]=1;
        posArr[vi++]=ax-nx; posArr[vi++]=ay-ny; posArr[vi++]=1;
        posArr[vi++]=bx-nx; posArr[vi++]=by-ny; posArr[vi++]=1;
        posArr[vi++]=bx+nx; posArr[vi++]=by+ny; posArr[vi++]=1;
      }

      // straight segments
      for (const [a, b] of HAND_LINES) {
        addQuad(pts[a].x, pts[a].y, pts[b].x, pts[b].y, LINE_W);
      }

      // thumb-index curve
      const cpx = (pts[1].x + pts[2].x + pts[5].x) / 3;
      const cpy = (pts[1].y + pts[2].y + pts[5].y) / 3;
      const STEPS = 8;
      for (let s = 0; s < STEPS; s++) {
        const t0 = s / STEPS, t1 = (s + 1) / STEPS;
        const ax = (1-t0)*(1-t0)*pts[1].x + 2*(1-t0)*t0*cpx + t0*t0*pts[5].x;
        const ay = (1-t0)*(1-t0)*pts[1].y + 2*(1-t0)*t0*cpy + t0*t0*pts[5].y;
        const bx = (1-t1)*(1-t1)*pts[1].x + 2*(1-t1)*t1*cpx + t1*t1*pts[5].x;
        const by = (1-t1)*(1-t1)*pts[1].y + 2*(1-t1)*t1*cpy + t1*t1*pts[5].y;
        addQuad(ax, ay, bx, by, LINE_W);
      }

      handLineGeos[handIdx].attributes.position.needsUpdate = true;
      handLineGeos[handIdx].setDrawRange(0, vi / 3);
      handLineMeshes[handIdx].visible = true;
    }

    function lm2scene(lm) {
      return { x: (1 - lm.x) * W - W/2, y: -(lm.y * H - H/2) };
    }

    async function startHands() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' }
        });
        videoEl.srcObject = stream;
        await videoEl.play();
        videoReady = true;
      } catch (e) { return; }

      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO", numHands: 2,
          minHandDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
      } catch (e) { return; }
    }
    startHands();

    function detectHands() {
      if (!handLandmarker || !videoReady) return;
      const now = performance.now();
      if (now - lastDetect < 80) return;
      lastDetect = now;

      let results;
      try { results = handLandmarker.detectForVideo(videoEl, now); } catch(e) { return; }

      for (const m of handLineMeshes) m.visible = false;

      if (results.landmarks && results.landmarks.length > 0) {
        hasHands = true;
        interactors = [];

        for (let h = 0; h < results.landmarks.length && h < 2; h++) {
          const hand = results.landmarks[h];

          // ── All 21 landmarks as repel points ──
          for (let j = 0; j < 21; j++) {
            interactors.push(lm2scene(hand[j]));
          }
          // ── Interpolated palm fill points ──
          for (let a = 0; a < PALM_VERTS.length; a++) {
            for (let b = a + 1; b < PALM_VERTS.length; b++) {
              const la = hand[PALM_VERTS[a]], lb = hand[PALM_VERTS[b]];
              interactors.push(lm2scene({ x: (la.x+lb.x)/2, y: (la.y+lb.y)/2 }));
            }
          }
          // palm center
          let cx = 0, cy = 0;
          for (const v of PALM_VERTS) { cx += hand[v].x; cy += hand[v].y; }
          cx /= PALM_VERTS.length; cy /= PALM_VERTS.length;
          interactors.push(lm2scene({ x: cx, y: cy }));

          // ── Update hand wireframe ──
          buildHandLines(h, hand);
        }
      } else {
        hasHands = false;
      }
    }

    // ══════════════════════════════════════════════
    // ANIMATE
    // ══════════════════════════════════════════════
    let time = 0;
    const totalCycle = PHASE_DURATION * 3;
    const phaseEl = document.getElementById('phase-label');
    const NAMES = ['reveal', 'disturb', 'draw'];
    let smoothMouseActive = 0;
    let hintVisible = true;
    let idleTime = 0;
    const hintEl = document.getElementById('hint');

    function animate() {
      requestAnimationFrame(animate);
      const dt = 0.016;
      time += dt;

      detectHands();

      const phase = Math.min((time % totalCycle) / PHASE_DURATION, 2.999);
      phaseEl.textContent = NAMES[Math.floor(phase)];

      const reveal  = Math.max(0, 1 - phase);
      const disturb = 1 - Math.abs(phase - 1);
      const draw    = Math.max(0, phase - 1.5) * 2;

      const mouseRadBase = 60 + disturb * 40;
      const flowStr    = 0.35; // gentle ocean drift
      const flowScale  = 0.0015;
      // breathing: trail persistence oscillates → whole field gently pulses
      fadeMat.uniforms.fade.value = 0.91 + 0.015 * Math.sin(time * 0.3);

      const posArr = geo.attributes.position.array;
      const lifeArr = geo.attributes.aLife.array;
      const hueArr = geo.attributes.aHueOff.array;
      let mouseActiveSum = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i*3, iy = i*3+1, ivx = i*2, ivy = i*2+1;

        // ── Age + lifecycle ──
        ages[i] += dt;
        const ageNorm = ages[i] / maxAges[i]; // 0→1
        if (ageNorm >= 1) {
          respawn(i);
          hueArr[i] = hueOffsets[i]; // sync buffer
          continue;
        }
        // fade in first 10%, fade out last 20%
        const fadeIn = Math.min(1, ageNorm / 0.1);
        const fadeOut = Math.min(1, (1 - ageNorm) / 0.2);
        const ageFade = fadeIn * fadeOut;
        // breathing ambient: each particle gently pulses at its own rate
        const breath = 0.08 + 0.03 * Math.sin(time * (0.3 + seeds[i] * 0.0004) + seeds[i]);
        lifeArr[i] = ageFade * (breath + excitation[i] * 0.8);

        let px = posArr[ix], py = posArr[iy];

        // ── Gentle ocean drift ──
        const fx = curlX(px, py, time * 0.4, flowScale) * flowStr;
        const fy = curlY(px, py, time * 0.4, flowScale) * flowStr;

        // ── Disturbance: repel + excite ──
        let mx = 0, my = 0;
        const points = hasHands ? interactors : (mouseIn ? [{x: mouseX, y: mouseY}] : []);
        const radNoise = 0.7 + 0.6 * (Math.sin(seeds[i] * 3.7 + time * 2) * 0.5 + 0.5);
        const rad = mouseRadBase * radNoise;
        let disturbed = false;
        for (let p = 0; p < points.length; p++) {
          const dx = px - points[p].x, dy = py - points[p].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < rad && dist > 0.1) {
            const inf = 1 - dist/rad;
            const infSq = inf * inf;
            mouseActiveSum += inf;
            mx += dx/dist * inf * 0.25;
            my += dy/dist * inf * 0.25;
            // excite this particle — it was disturbed
            excitation[i] = Math.min(1, excitation[i] + inf * 0.06);
            disturbed = true;
          }
        }
        // excitation decays slowly
        if (!disturbed) excitation[i] *= 0.95; // fast glow decay

        const jx = (Math.random() - 0.5) * 0.15;
        const jy = (Math.random() - 0.5) * 0.15;
        velocities[ivx] += (fx + mx + jx) * dt * 60;
        velocities[ivy] += (fy + my + jy) * dt * 60;
        velocities[ivx] *= 0.98; // less damping — drift further
        velocities[ivy] *= 0.98;

        posArr[ix] += velocities[ivx];
        posArr[iy] += velocities[ivy];

        // wrap
        const hw = W/2+50, hh = H/2+50;
        if (posArr[ix] < -hw) posArr[ix] += W+100;
        if (posArr[ix] >  hw) posArr[ix] -= W+100;
        if (posArr[iy] < -hh) posArr[iy] += H+100;
        if (posArr[iy] >  hh) posArr[iy] -= H+100;
      }

      geo.attributes.position.needsUpdate = true;
      geo.attributes.aLife.needsUpdate = true;
      geo.attributes.aHueOff.needsUpdate = true;

      const mouseActive = Math.min(1, mouseActiveSum / 200);
      smoothMouseActive += ((mouseIn ? Math.max(mouseActive, 0.3) : 0) - smoothMouseActive) * 0.05;

      pMat.uniforms.uPhase.value = phase;
      pMat.uniforms.uMouseActive.value = smoothMouseActive;

      // hint text: hide on activity, show after idle
      if (hasHands || mouseIn) {
        idleTime = 0;
        if (hintVisible) { hintEl.style.opacity = '0'; hintVisible = false; }
      } else {
        idleTime += dt;
        if (idleTime > 8 && !hintVisible) { hintEl.style.opacity = '1'; hintVisible = true; }
      }

      // ── Render with trails ──
      // 1. trail buffer: fade previous frame, draw fresh particles on top
      fadeMat.uniforms.tPrev.value = readRT.texture;
      renderer.setRenderTarget(writeRT);
      renderer.clear();
      renderer.render(trailScene, trailCam);  // faded previous frame
      renderer.autoClear = false;
      renderer.render(scene, camera);          // live particles added (additive)
      renderer.autoClear = true;
      renderer.setRenderTarget(null);

      // 2. composite trail buffer to screen
      //    trail buffer = accumulated fading trails + bright live particles
      compMat.uniforms.tTrail.value = writeRT.texture;
      renderer.render(compScene, trailCam);

      [readRT, writeRT] = [writeRT, readRT];
    }

    // ══════════════════════════════════════════════
    // RESIZE
    // ══════════════════════════════════════════════
    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      camera.left = -w/2; camera.right = w/2;
      camera.top = h/2; camera.bottom = -h/2;
      camera.updateProjectionMatrix();
      trailCam.left = -w/2; trailCam.right = w/2;
      trailCam.top = h/2; trailCam.bottom = -h/2;
      trailCam.updateProjectionMatrix();
    });

    animate();
  </script>
</body>
</html>
